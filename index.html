<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<div class="back-home-zone"></div>

<div class="main-fixed" id="top">
  <nav class="nav">
    <a href="#top" class="logo" id="logoText">포트폴리오</a>
    <button class="dark-toggle" id="darkToggle" type="button" aria-label="dark mode">☾</button>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1 class="title">
        <div class="box left">
          <div class="slider" id="leftWords"></div>
        </div>

        <span class="fixed" id="centerWord">담은</span>

        <div class="box right">
          <div class="slider" id="rightWords"></div>
        </div>
      </h1>

      <p class="subtitle" id="mainSubtitle"></p>
    </div>

    <div class="image-marquee">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>
  </section>
</div>

<div class="scroll-area">
  <section class="about-panel" id="about">
    <div class="panel-inner">
      <div class="about-layout">
        <div class="profile-card">
          <div class="profile-img">
            <img id="profileImage" src="" alt="profile image">
          </div>

          <div class="profile-info">
            <h3 id="profileName"></h3>
            <p id="profileInfo"></p>
          </div>
        </div>

        <div class="about-content">
          <h2 class="panel-title" id="aboutTitle"></h2>
          <p class="panel-desc" id="aboutDesc"></p>
          <div class="keyword-row" id="keywordRow"></div>
          <div class="panel-cards" id="aboutCards"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="about-hold"></div>

  <section class="category-panel" id="category">
    <div class="panel-inner">

      <div class="category-head">
        <div class="category-title-row">
          <h2 class="panel-title" id="categoryTitle"></h2>

          <div class="category-actions">
            <button class="category-add-btn" type="button" aria-label="Add Project">+</button>

            <button class="category-back-btn" type="button" aria-label="Back">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <path d="M28 12 L16 24 L28 36"/>
                <path d="M17 24 H38"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="panel-desc" id="categoryDesc"></p>
        <p class="category-small" id="categorySmall"></p>
      </div>

      <div class="category-buttons glass-tabs">
        <span class="glass-indicator"></span>
        <button class="category-btn active" type="button" data-tab="all">전체</button>
        <button class="category-btn" type="button" data-tab="brand">브랜드</button>
        <button class="category-btn" type="button" data-tab="graphic">그래픽</button>
        <button class="category-btn" type="button" data-tab="ui">UI</button>
        <button class="category-btn" type="button" data-tab="artwork">아트웍</button>
      </div>

      <div class="product-list">
        <div class="product-group" data-category="brand"></div>
        <div class="product-group" data-category="graphic"></div>
        <div class="product-group" data-category="ui"></div>
        <div class="product-group" data-category="artwork"></div>
      </div>

    </div>
  </section>

  <section id="contact"></section>
</div>

<div class="detail-overlay">
  <div class="detail-panel">
    <button class="detail-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24">
        <path d="M6 6L18 18M18 6L6 18"/>
      </svg>
    </button>

    <div class="detail-image">
      <img id="detailImg" src="" alt="project detail image">
    </div>

    <div class="detail-content">
      <span class="detail-category">PORTFOLIO PROJECT</span>
      <h2 id="detailTitle">Project Title</h2>
      <p id="detailDesc">프로젝트 상세 설명이 들어갑니다.</p>

      <div class="detail-meta">
        <div>
          <span>TYPE</span>
          <strong id="detailType">Brand Design</strong>
        </div>

        <div>
          <span>ROLE</span>
          <strong id="detailRole">Design / Visual</strong>
        </div>

        <div>
          <span>YEAR</span>
          <strong id="detailYear">2026</strong>
        </div>
      </div>

      <div class="detail-long">
        <h3>Project Story</h3>
        <p id="detailStory">상세 설명이 들어갑니다.</p>
        <div class="detail-gallery" id="detailGallery"></div>
        <div class="detail-media" id="detailMedia"></div>
        <div class="detail-links" id="detailLinks"></div>
      </div>

      <button class="detail-edit-btn" type="button">수정하기</button>
    </div>
  </div>
</div>

<div class="admin-overlay">
  <div class="admin-panel">
    <button class="admin-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24">
        <path d="M6 6L18 18M18 6L6 18"/>
      </svg>
    </button>

    <div class="admin-content">
      <h2 id="adminTitle">ADD PROJECT</h2>

      <div id="loginBox" class="admin-form">
        <input type="email" id="loginEmail" placeholder="관리자 이메일">
        <input type="password" id="loginPassword" placeholder="비밀번호">

        <div class="admin-btn-row">
          <button class="admin-btn" type="button" id="loginBtn">로그인</button>
        </div>

        <p class="admin-status">관리자만 게시물을 등록할 수 있어.</p>
      </div>

      <div id="adminFormBox" class="admin-form">
        <input type="hidden" id="editId">

        <input type="text" id="projectTitle" placeholder="제목">

        <select id="projectCategory">
          <option value="brand">브랜드</option>
          <option value="graphic">그래픽</option>
          <option value="ui">UI</option>
          <option value="artwork">아트웍</option>
        </select>

        <input type="text" id="projectShortDesc" placeholder="짧은 설명 예: Logo / Identity">
        <textarea id="projectContent" placeholder="상세 설명"></textarea>
        <input type="text" id="projectRole" placeholder="역할 예: Design / Visual">
        <input type="text" id="projectYear" placeholder="연도 예: 2026">

        <label class="admin-label">대표 이미지</label>
        <input type="file" id="projectImage" accept="image/*">

        <label class="admin-label">상세 이미지 여러 장</label>
        <input type="file" id="projectDetailImages" accept="image/*" multiple>
        <div id="detailPreviewList" class="detail-preview-list"></div>

        <label class="admin-label">영상 / 움짤 파일 업로드</label>
        <input type="file" id="projectVideoFile" accept="video/*,.gif">

        <label class="admin-label">영상 / 움짤 링크</label>
        <input type="text" id="projectVideoUrl" placeholder="유튜브, 비메오, GIF 링크 등">

        <label class="admin-label">PDF / 외부 링크</label>
        <input type="text" id="projectPdfUrl" placeholder="PDF, Behance, Figma, Notion 링크 등">

        <div class="admin-btn-row">
          <button class="admin-btn" type="button" id="saveBtn">저장하기</button>
          <button class="admin-btn sub" type="button" id="resetBtn">새 글</button>
          <button class="admin-btn sub" type="button" id="deleteBtn">삭제</button>
          <button class="admin-btn sub" type="button" id="logoutBtn">로그아웃</button>
        </div>

        <p class="admin-status" id="adminStatus"></p>
      </div>
    </div>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
