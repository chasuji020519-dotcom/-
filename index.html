<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHA SUJI Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#fff;
    color:#111;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
    overflow-x:hidden;
}

/* NAV */
.nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:86px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 clamp(24px,5vw,72px);
    z-index:999;
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(16px);
}

.logo{
    font-size:13px;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
}

.menu{
    display:flex;
    gap:clamp(18px,3vw,42px);
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:12px;
    font-weight:600;
    letter-spacing:.08em;
    transition:.3s ease;
}

.menu a:hover{
    opacity:.35;
}

/* HERO */
.hero{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:120px clamp(24px,5vw,72px) 80px;
    overflow:hidden;
}

.title{
    width:min(1500px,100%);
    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;
    font-size:clamp(64px,8.5vw,150px);
    font-weight:800;
    letter-spacing:-0.075em;
    line-height:1;
}

.fixed{
    white-space:nowrap;
    text-align:center;
    padding:0 .22em;
}

.box{
    width:100%;
    height:1.12em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 14s infinite cubic-bezier(.76,0,.24,1);
}

.word{
    height:1.12em;
    line-height:1.12em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
    padding-right:.08em;
}

.right .word{
    text-align:left;
    padding-left:.08em;
}

.subtitle{
    margin-top:36px;
    font-size:clamp(15px,1.5vw,21px);
    font-weight:400;
    color:#888;
    letter-spacing:-0.03em;
    text-align:center;
    line-height:1.6;
}

.sub-en{
    margin-top:8px;
    font-size:12px;
    font-weight:600;
    color:#bbb;
    letter-spacing:.16em;
    text-transform:uppercase;
}

/* SLIDE */
@keyframes slideText{
    0%,15%{
        transform:translateY(0);
    }

    21%,36%{
        transform:translateY(-1.12em);
    }

    42%,57%{
        transform:translateY(-2.24em);
    }

    63%,78%{
        transform:translateY(-3.36em);
    }

    84%,100%{
        transform:translateY(-4.48em);
    }
}

/* TABLET */
@media(max-width:1024px){
    .title{
        font-size:clamp(58px,9vw,110px);
        letter-spacing:-0.07em;
    }
}

/* MOBILE */
@media(max-width:768px){

    .nav{
        height:auto;
        padding:22px 24px;
        align-items:flex-start;
    }

    .logo{
        font-size:12px;
    }

    .menu{
        gap:14px;
        flex-wrap:wrap;
        justify-content:flex-end;
        max-width:210px;
    }

    .menu a{
        font-size:10px;
    }

    .hero{
        padding:120px 24px 70px;
        align-items:flex-start;
    }

    .title{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:flex-start;
        font-size:clamp(56px,17vw,86px);
        letter-spacing:-0.065em;
        line-height:.95;
    }

    .fixed{
        padding:0;
        margin:.04em 0;
    }

    .box{
        width:100%;
        height:1.05em;
    }

    .word{
        height:1.05em;
        line-height:1.05em;
    }

    .left .word,
    .right .word{
        text-align:left;
        padding:0;
    }

    @keyframes slideText{
        0%,15%{
            transform:translateY(0);
        }

        21%,36%{
            transform:translateY(-1.05em);
        }

        42%,57%{
            transform:translateY(-2.1em);
        }

        63%,78%{
            transform:translateY(-3.15em);
        }

        84%,100%{
            transform:translateY(-4.2em);
        }
    }

    .subtitle{
        margin-top:32px;
        text-align:left;
        font-size:15px;
        line-height:1.7;
    }

    .sub-en{
        font-size:10px;
        letter-spacing:.13em;
    }
}

/* SMALL MOBILE */
@media(max-width:420px){

    .nav{
        padding:20px;
    }

    .menu{
        gap:10px 14px;
        max-width:180px;
    }

    .hero{
        padding:116px 20px 60px;
    }

    .title{
        font-size:clamp(48px,18vw,72px);
    }
}
</style>
</head>

<body>

<nav class="nav">
    <div class="logo">CHA SUJI</div>

    <div class="menu">
        <a href="#about">ABOUT</a>
        <a href="#works">WORKS</a>
        <a href="#archive">ARCHIVE</a>
        <a href="#contact">CONTACT</a>
    </div>
</nav>

<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">
                <div class="word">감각을</div>
                <div class="word">가치를</div>
                <div class="word">경험을</div>
                <div class="word">흐름을</div>
                <div class="word">감각을</div>
            </div>
        </div>

        <span class="fixed">담은</span>

        <div class="box right">
            <div class="slider">
                <div class="word">디자인</div>
                <div class="word">브랜딩</div>
                <div class="word">콘텐츠</div>
                <div class="word">포트폴리오</div>
                <div class="word">디자인</div>
            </div>
        </div>

    </h1>

    <p class="subtitle">
        시선이 머무는 순간부터, 브랜드의 분위기를 설계합니다.
    </p>

    <p class="sub-en">
        VISUAL DESIGN PORTFOLIO
    </p>

</section>

</body>
</html>
