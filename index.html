<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#ffffff;
  --text:#111111;
  --sub:#8a8a8a;
  --panel-bg:rgba(255,255,255,.72);
  --panel-border:rgba(255,255,255,.8);
  --card-bg:rgba(255,255,255,.48);
  --card-border:rgba(0,0,0,.08);
  --box-text:rgba(0,0,0,.55);
  --button-bg:#111;
  --button-text:#fff;
  --marquee-gradient:linear-gradient(to bottom,rgba(255,255,255,1) 0%,rgba(255,255,255,.65) 18%,rgba(255,255,255,.12) 42%,rgba(0,0,0,.18) 100%);
}

body.dark-mode{
  --bg:#111111;
  --text:#f5f5f5;
  --sub:rgba(255,255,255,.55);
  --panel-bg:rgba(20,20,20,.78);
  --panel-border:rgba(255,255,255,.12);
  --card-bg:rgba(255,255,255,.08);
  --card-border:rgba(255,255,255,.14);
  --box-text:rgba(255,255,255,.58);
  --button-bg:#fff;
  --button-text:#111;
  --marquee-gradient:linear-gradient(to bottom,rgba(17,17,17,1) 0%,rgba(17,17,17,.7) 18%,rgba(17,17,17,.18) 42%,rgba(255,255,255,.1) 100%);
}

html{
  scroll-behavior:smooth;
  scroll-snap-type:y mandatory;
  scroll-padding-top:105px;
}

body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
  color:var(--text);
  overflow-x:hidden;
  overscroll-behavior-y:contain;
  transition:background .35s ease,color .35s ease;
}

body.category-mode{overflow:hidden}
body.category-mode .main-fixed,
body.category-mode .about-panel,
body.category-mode .about-hold{display:none}

body.category-mode .scroll-area{
  position:fixed;
  inset:0;
  z-index:1000;
  margin-top:0;
  overflow-y:auto;
  background:var(--bg);
}

body.category-mode .category-panel{
  min-height:100vh;
  padding-top:70px;
  box-shadow:none;
  border-top:none;
  scroll-snap-align:none;
}

.back-home-zone{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:105px;
  z-index:900;
  pointer-events:none;
}

.back-home-zone.active{pointer-events:auto}
body.category-mode .back-home-zone{display:none}

.main-fixed{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  z-index:1;
  background:var(--bg);
  overflow:hidden;
  scroll-snap-align:start;
}

.nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:32px 40px;
  z-index:999;
}

body.category-mode .nav{display:none}

.logo{
  font-size:24px;
  font-weight:700;
  letter-spacing:.12em;
  color:var(--text);
  text-decoration:none;
}

.dark-toggle{
  width:46px;
  height:46px;
  border:none;
  border-radius:50%;
  background:var(--button-bg);
  color:var(--button-text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  transition:.3s ease;
}

.dark-toggle:hover{transform:translateY(-2px)}

.hero{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:90px 0 0;
}

.hero-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  width:100%;
  padding:0 40px;
}

.title{
  width:min(1500px,100%);
  display:grid;
  grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  align-items:center;
  font-size:clamp(70px,7.5vw,130px);
  font-weight:700;
  letter-spacing:-0.08em;
  line-height:1;
}

.fixed{
  white-space:nowrap;
  text-align:center;
  padding:0 .2em;
}

.box{
  width:100%;
  height:1.1em;
  overflow:hidden;
}

.slider{
  display:flex;
  flex-direction:column;
  animation:slideText 14s infinite ease-in-out;
}

.word{
  height:1.1em;
  line-height:1.1em;
  white-space:nowrap;
}

.left .word{text-align:right;padding-right:.08em}
.right .word{text-align:left;padding-left:.08em}

.subtitle{
  margin-top:30px;
  font-size:18px;
  color:var(--sub);
  letter-spacing:-0.02em;
}

@keyframes slideText{
  0%,16%{transform:translateY(0)}
  22%,38%{transform:translateY(-1.1em)}
  44%,60%{transform:translateY(-2.2em)}
  66%,82%{transform:translateY(-3.3em)}
  88%,100%{transform:translateY(-4.4em)}
}

.image-marquee{
  position:relative;
  width:100%;
  overflow:hidden;
}

.image-marquee::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:var(--marquee-gradient);
  transition:background .35s ease;
}

.marquee-track{
  display:flex;
  width:max-content;
  animation:marquee 38s linear infinite;
}

.project{
  flex-shrink:0;
  width:300px;
  height:200px;
  overflow:hidden;
}

.project img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(.9) contrast(1.05);
}

@keyframes marquee{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.scroll-area{
  position:relative;
  z-index:5;
  margin-top:100vh;
  background:var(--bg);
}

.about-panel,
.category-panel{
  width:100%;
  padding:70px 40px;
  background:var(--panel-bg);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  border-top:1px solid var(--panel-border);
  box-shadow:0 -30px 90px rgba(0,0,0,.12);
  scroll-snap-align:start;
  scroll-snap-stop:always;
}

.about-panel{
  position:sticky;
  top:105px;
  z-index:1;
  min-height:calc(100vh - 105px);
}

.about-hold{height:1px}

.category-panel{
  position:relative;
  z-index:3;
  min-height:calc(100vh - 105px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.category-panel:not(.opened) .panel-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:calc(100vh - 245px);
}

.category-panel.opened{align-items:flex-start}

.panel-inner{
  max-width:1180px;
  width:100%;
  margin:0 auto;
}

.about-layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:48px;
  align-items:start;
}

.profile-card{
  border-radius:16px;
  overflow:hidden;
  background:var(--card-bg);
  border:1px solid var(--panel-border);
  box-shadow:0 18px 50px rgba(0,0,0,.08);
}

.profile-img{
  width:100%;
  height:360px;
  background:#eee;
  overflow:hidden;
}

.profile-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.profile-info{padding:22px}

.profile-info h3{
  font-size:22px;
  letter-spacing:-.04em;
  margin-bottom:8px;
}

.profile-info p{
  font-size:13px;
  line-height:1.65;
  color:var(--box-text);
}

.panel-title{
  font-size:clamp(28px,4vw,60px);
  line-height:.95;
  letter-spacing:-.075em;
  margin-bottom:16px;
  color:var(--text);
}

.panel-desc{
  max-width:650px;
  font-size:16px;
  line-height:1.75;
  color:var(--box-text);
}

.keyword-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:24px;
}

.keyword{
  padding:8px 14px;
  border-radius:999px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  font-size:12px;
  color:var(--box-text);
}

.panel-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:28px;
}

.card{
  min-height:145px;
  padding:22px;
  border-radius:24px;
  background:var(--card-bg);
  border:1px solid var(--panel-border);
  box-shadow:0 14px 40px rgba(0,0,0,.06);
}

.card span{
  display:block;
  font-size:11px;
  color:var(--sub);
  margin-bottom:22px;
}

.card h3{
  font-size:21px;
  letter-spacing:-.04em;
  margin-bottom:10px;
  color:var(--text);
}

.card p{
  font-size:13px;
  line-height:1.6;
  color:var(--box-text);
}

.category-head{
  text-align:center;
  transition:.65s cubic-bezier(.22,1,.36,1);
}

.category-panel.opened .category-head{text-align:left}

.category-title-row{
  display:flex;
  align-items:center;
  width:max-content;
  margin-left:50%;
  transform:translateX(-50%);
  transition:.75s cubic-bezier(.22,1,.36,1);
}

.category-panel.opened .category-title-row{
  width:100%;
  margin-left:0;
  transform:translateX(0);
  justify-content:space-between;
}

.category-title-row .panel-title{margin-bottom:0}

.category-actions{
  display:none;
  align-items:center;
  gap:10px;
}

.category-panel.opened .category-actions{display:flex}

.category-back-btn,
.category-add-btn{
  width:56px;
  height:56px;
  border:none;
  background:transparent;
  cursor:pointer;
  flex-shrink:0;
  transition:.3s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}

.category-add-btn{
  border-radius:50%;
  background:var(--button-bg);
  color:var(--button-text);
  font-size:34px;
  font-weight:200;
  line-height:1;
  box-shadow:0 12px 30px rgba(0,0,0,.16);
}

.category-back-btn svg{width:44px;height:44px;overflow:visible}

.category-back-btn path{
  fill:none;
  stroke:var(--text);
  stroke-width:3.2;
  stroke-linecap:square;
  stroke-linejoin:miter;
}

.category-back-btn:hover{transform:translateX(-4px)}
.category-add-btn:hover{transform:translateY(-3px)}

.category-head .panel-desc{margin:16px auto 0}
.category-panel.opened .category-head .panel-desc{margin-left:0}

.category-small{
  margin-top:16px;
  font-size:13px;
  color:var(--sub);
  letter-spacing:.08em;
}

.category-buttons{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  width:max-content;
  margin-top:34px;
  margin-left:50%;
  transform:translateX(-50%);
  transition:.75s cubic-bezier(.22,1,.36,1);
}

.category-panel.opened .category-buttons{
  margin-left:0;
  transform:translateX(0);
}

.category-btn{
  border:1px solid var(--panel-border);
  outline:none;
  cursor:pointer;
  padding:15px 30px;
  border-radius:999px;
  background:var(--card-bg);
  color:var(--text);
  font-size:16px;
  font-weight:600;
  letter-spacing:-.03em;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.2),0 10px 28px rgba(0,0,0,.12);
  transition:.35s cubic-bezier(.22,1,.36,1);
}

.category-btn:hover{transform:translateY(-3px)}
.category-btn.active{background:var(--button-bg);color:var(--button-text)}

.product-list{
  position:relative;
  margin-top:40px;
  min-height:620px;
}

.category-panel:not(.opened) .product-list{display:none}

.product-group{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  opacity:0;
  visibility:hidden;
  transform:translateY(32px);
  pointer-events:none;
  transition:.65s cubic-bezier(.22,1,.36,1);
}

.product-group.active{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
  pointer-events:auto;
}

.product-list.all-active{
  min-height:0;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:28px;
}

.product-list.all-active .product-group{display:contents}
.product-list.all-active .product-item{width:100%}

.product-item{
  height:310px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  background:#eee;
  box-shadow:0 20px 55px rgba(0,0,0,.09);
  cursor:pointer;
}

.product-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.45s ease;
}

.product-item:hover img{transform:scale(1.06)}

.product-info{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  padding:22px;
  color:#fff;
  background:linear-gradient(to top,rgba(0,0,0,.58),transparent);
}

.product-info h4{
  font-size:20px;
  letter-spacing:-.04em;
}

.product-info p{
  margin-top:5px;
  font-size:13px;
  opacity:.8;
}

.detail-overlay,
.admin-overlay{
  position:fixed;
  inset:0;
  z-index:5000;
  display:flex;
  align-items:flex-end;
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  visibility:hidden;
  transition:.35s ease;
}

.detail-overlay.show,
.admin-overlay.show{
  opacity:1;
  visibility:visible;
}

.detail-panel,
.admin-panel{
  width:100%;
  height:88vh;
  max-height:100vh;
  background:var(--panel-bg);
  color:var(--text);
  border-radius:38px 38px 0 0;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .7s cubic-bezier(.22,1,.36,1),height .45s cubic-bezier(.22,1,.36,1),border-radius .45s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -30px 90px rgba(0,0,0,.18);
  scroll-behavior:smooth;
}

.detail-overlay.show .detail-panel,
.admin-overlay.show .admin-panel{transform:translateY(0)}

.detail-overlay.full,
.admin-overlay.full{background:rgba(0,0,0,.08)}

.detail-overlay.full .detail-panel,
.admin-overlay.full .admin-panel{
  height:100vh;
  border-radius:0;
}

.detail-close,
.admin-close{
  position:sticky;
  top:22px;
  margin:22px 24px 0 auto;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:var(--button-bg);
  color:var(--button-text);
  box-shadow:0 8px 24px rgba(0,0,0,.1);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.detail-close svg,
.admin-close svg{width:22px;height:22px}

.detail-close path,
.admin-close path{
  stroke:var(--button-text);
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
}

.detail-image{
  width:100%;
  max-width:1050px;
  height:auto;
  margin:40px auto 0;
  padding:0 40px;
}

.detail-image img{
  width:100%;
  max-height:520px;
  object-fit:contain;
  border-radius:32px;
  background:#f3f3f3;
  display:block;
}

.detail-content,
.admin-content{
  max-width:1050px;
  margin:0 auto;
  padding:58px 40px 120px;
}

.detail-category{
  display:block;
  margin-bottom:16px;
  font-size:12px;
  letter-spacing:.16em;
  color:var(--sub);
}

.detail-content h2,
.admin-content h2{
  font-size:clamp(38px,5vw,72px);
  line-height:.95;
  letter-spacing:-.07em;
}

.detail-content p{
  max-width:720px;
  margin-top:24px;
  font-size:17px;
  line-height:1.8;
  color:var(--box-text);
}

.detail-meta{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:42px;
}

.detail-meta div{
  padding:22px;
  border-radius:24px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
}

.detail-meta span{
  display:block;
  font-size:12px;
  color:var(--sub);
  margin-bottom:10px;
}

.detail-meta strong{
  font-size:16px;
  letter-spacing:-.03em;
}

.detail-long{
  margin-top:46px;
  padding-top:40px;
  border-top:1px solid var(--card-border);
}

.detail-long h3{
  font-size:26px;
  letter-spacing:-.05em;
  margin-bottom:16px;
}

.detail-gallery,
.detail-media{
  margin-top:42px;
  display:flex;
  flex-direction:column;
  gap:34px;
}

.detail-gallery img,
.detail-media img,
.detail-media video{
  width:100%;
  max-width:1000px;
  object-fit:contain;
  display:block;
  border-radius:24px;
  background:#f3f3f3;
}

.detail-links{
  margin-top:42px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.detail-links a,
.detail-edit-btn,
.admin-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:none;
  border-radius:999px;
  padding:14px 22px;
  background:var(--button-bg);
  color:var(--button-text);
  text-decoration:none;
  font-size:14px;
  cursor:pointer;
}

.detail-edit-btn{
  display:none;
  margin-top:34px;
}

body.logged-in .detail-edit-btn{display:inline-flex}

.admin-form{margin-top:34px}

.admin-form input,
.admin-form select,
.admin-form textarea{
  width:100%;
  padding:15px 16px;
  border:1px solid var(--card-border);
  border-radius:16px;
  margin-bottom:12px;
  font-size:15px;
  background:var(--card-bg);
  color:var(--text);
  outline:none;
}

.admin-form textarea{
  min-height:170px;
  resize:vertical;
}

.admin-label{
  display:block;
  margin:18px 0 8px;
  font-size:13px;
  color:var(--sub);
}

.admin-btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.admin-btn.sub{
  background:var(--card-bg);
  color:var(--text);
}

.admin-status{
  margin-top:16px;
  color:var(--box-text);
  font-size:14px;
}

#adminFormBox{display:none}
#loginBox{display:block}
body.logged-in #adminFormBox{display:block}
body.logged-in #loginBox{display:none}

.detail-preview-list{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin:12px 0 20px;
}

.detail-preview-item{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:#eee;
  cursor:grab;
  border:1px solid var(--card-border);
}

.detail-preview-item.dragging{opacity:.4}

.detail-preview-item img{
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}

.detail-preview-item button{
  position:absolute;
  top:8px;
  right:8px;
  width:28px;
  height:28px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.75);
  color:#fff;
  cursor:pointer;
}

.detail-preview-item span{
  position:absolute;
  left:8px;
  bottom:8px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.85);
  font-size:11px;
  color:#111;
}

#contact{display:none}

@media(max-width:900px){
  .about-layout{grid-template-columns:1fr;gap:34px}
  .profile-card{max-width:360px}
  .panel-cards{grid-template-columns:1fr}
  .product-list.all-active,
  .product-group.active{grid-template-columns:repeat(2,minmax(0,1fr))}
  .product-list{min-height:900px}
  .product-list.all-active{min-height:0}
  .detail-meta{grid-template-columns:1fr}
  .detail-preview-list{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:768px){
  html{scroll-padding-top:86px}
  .back-home-zone{height:86px}
  .nav{padding:28px 24px}
  .logo{font-size:15px}
  .dark-toggle{width:42px;height:42px;font-size:19px}
  .hero{padding:80px 0 0}
  .hero-content{padding:0 24px}
  .title{font-size:clamp(44px,11vw,76px)}
  .subtitle{font-size:15px;text-align:center;margin-top:24px}
  .project{width:280px;height:180px}
  .about-panel{
    top:86px;
    min-height:calc(100vh - 86px);
    padding:42px 24px 48px;
  }
  .category-panel{
    min-height:calc(100vh - 86px);
    padding:42px 24px 48px;
  }
  body.category-mode .category-panel{
    min-height:100vh;
    padding:42px 24px 48px;
  }
  .panel-title{font-size:clamp(42px,12vw,68px)}
  .panel-desc{font-size:15px}
  .profile-img{height:390px}
  .category-buttons{
    margin-left:0;
    transform:none;
    width:100%;
    flex-wrap:nowrap;

function renderDetailPreview(){
  detailPreviewList.innerHTML="";
  detailItems.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="detail-preview-item";
    div.draggable=true;
    div.dataset.index=index;
    div.innerHTML=`<img src="${item.preview}"><button type="button">×</button><span>${index+1}</span>`;

    div.querySelector("button").addEventListener("click",()=>{
      detailItems.splice(index,1);
      renderDetailPreview();
    });

    div.addEventListener("dragstart",()=>{
      draggedIndex=index;
      div.classList.add("dragging");
    });

    div.addEventListener("dragend",()=>{
      draggedIndex=null;
      div.classList.remove("dragging");
    });

    div.addEventListener("dragover",(e)=>e.preventDefault());

    div.addEventListener("drop",(e)=>{
      e.preventDefault();
      const targetIndex=Number(div.dataset.index);
      if(draggedIndex===null||draggedIndex===targetIndex)return;
      const movedItem=detailItems.splice(draggedIndex,1)[0];
      detailItems.splice(targetIndex,0,movedItem);
      renderDetailPreview();
    });

    detailPreviewList.appendChild(div);
  });
}

projectDetailImages.addEventListener("change",(e)=>{
  const files=Array.from(e.target.files);
  files.forEach(file=>{
    detailItems.push({

      url:null
    });
  });
  projectDetailImages.value="";

});

  detailGallery.innerHTML="";
  detailMedia.innerHTML="";
  detailLinks.innerHTML="";

  (project.detail_images||[]).forEach(url=>{
    detailGallery.innerHTML+=`<img src="${url}" alt="detail image">`;
  });

  if(project.video_url){
    if(/\.(gif)(\?.*)?$/i.test(project.video_url)){
      detailMedia.innerHTML+=`<img src="${project.video_url}" alt="gif image">`;
    }else if(/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(project.video_url)){
      detailMedia.innerHTML+=`<video src="${project.video_url}" controls muted loop playsinline></video>`;
    }else{
      detailLinks.innerHTML+=`<a href="${project.video_url}" target="_blank">영상 보기</a>`;
    }
  }

  if(project.pdf_url){
    detailLinks.innerHTML+=`<a href="${project.pdf_url}" target="_blank">PDF / 외부 링크</a>`;
  }

  detailPanel.scrollTop=0;
  detailOverlay.classList.remove("full");
  detailOverlay.classList.add("show");
}

function makeCard(project){
  return `
  <div class="product-item" data-id="${project.id}">
    <img src="${project.image_url||""}" alt="${project.title||""}">
    <div class="product-info">
      <h4>${project.title||"Untitled"}</h4>
      <p>${project.short_desc||""}</p>
    </div>
  </div>`;
}

async function loadProjects(){
  const {data,error}=await client.from("projects").select("*").order("created_at",{ascending:false});
  if(error){console.log(error);return}
  allProjects=data||[];

  groups.forEach(group=>group.innerHTML="");

  allProjects.forEach(project=>{
    const group=document.querySelector(`[data-category="${project.category}"]`);
    if(group){group.innerHTML+=makeCard(project)}
  });

  document.querySelectorAll(".product-item").forEach(item=>{
    item.addEventListener("click",()=>{
      const id=Number(item.dataset.id);
      const project=allProjects.find(p=>p.id===id);
      if(project)openDetail(project);
    });
  });
}

  await client.auth.signOut();
  document.body.classList.remove("logged-in");
  closeAdmin();
});

async function uploadImage(){
  const file=projectImage.files[0];
  if(!file)return null;
  const fileName=`${Date.now()}-${file.name}`;
  const {error}=await client.storage.from("portfolio").upload(fileName,file);
  if(error){alert("대표 이미지 업로드 실패: "+error.message);return null}
  const {data}=client.storage.from("portfolio").getPublicUrl(fileName);
  return data.publicUrl;
}

async function uploadVideoFile(){
  const file=projectVideoFile.files[0];
  if(!file)return null;
  const fileName=`${Date.now()}-${file.name}`;
  const {error}=await client.storage.from("portfolio").upload(fileName,file);
  if(error){alert("영상/움짤 업로드 실패: "+error.message);return null}
  const {data}=client.storage.from("portfolio").getPublicUrl(fileName);
  return data.publicUrl;
}

async function uploadDetailImages(){
  if(!detailItems.length)return null;
  const urls=[];

  for(const item of detailItems){
    if(item.type==="url"){
      urls.push(item.url);
      continue;
    }

    const file=item.file;
    const fileName=`${Date.now()}-${Math.random().toString(36).slice(2)}-${file.name}`;
    const {error}=await client.storage.from("portfolio").upload(fileName,file);

    if(error){
      alert("상세 이미지 업로드 실패: "+error.message);
      return null;
    }

    const {data}=client.storage.from("portfolio").getPublicUrl(fileName);
    urls.push(data.publicUrl);
  }

  return urls;
}

document.getElementById("saveBtn").addEventListener("click",async()=>{
  if(!projectTitle.value){
    alert("제목을 입력해줘");
    return;
  }

  adminStatus.innerText="저장 중...";

  const imageUrl=await uploadImage();
  const detailImages=await uploadDetailImages();
  const videoFileUrl=await uploadVideoFile();

  const projectData={
    title:projectTitle.value,
    category:projectCategory.value,
    short_desc:projectShortDesc.value,
    content:projectContent.value,
    role:projectRole.value,
    project_year:projectYear.value,
    video_url:videoFileUrl || projectVideoUrl.value,
    pdf_url:projectPdfUrl.value
  };

  if(imageUrl){projectData.image_url=imageUrl}
  if(detailImages){projectData.detail_images=detailImages}

  let result;

  if(editId.value){
    result=await client.from("projects").update(projectData).eq("id",editId.value);
  }else{
    result=await client.from("projects").insert(projectData);
  }

  if(result.error){
    adminStatus.innerText="";
    alert("저장 실패: "+result.error.message);
    return;
  }

  adminStatus.innerText="저장 완료!";
  await loadProjects();
  resetForm();
});

document.getElementById("resetBtn").addEventListener("click",resetForm);

document.getElementById("deleteBtn").addEventListener("click",async()=>{
  if(!editId.value){
    alert("삭제할 게시물이 없어");
    return;
  }

  if(!confirm("정말 삭제할까?"))return;

  const {error}=await client.from("projects").delete().eq("id",editId.value);

  if(error){
    alert("삭제 실패: "+error.message);
    return;
  }

  alert("삭제 완료");
  resetForm();
  closeAdmin();
  closeDetail();
  await loadProjects();
});

function resetForm(){
  adminTitle.innerText="ADD PROJECT";
  editId.value="";
  projectTitle.value="";
  projectCategory.value="brand";
  projectShortDesc.value="";
  projectContent.value="";
  projectRole.value="";
  projectYear.value="";
  projectImage.value="";
  projectDetailImages.value="";
  projectVideoFile.value="";
  projectVideoUrl.value="";
  projectPdfUrl.value="";
  adminStatus.innerText="";
  detailItems=[];
  renderDetailPreview();
}

function fillForm(project){
  adminTitle.innerText="EDIT PROJECT";
  editId.value=project.id;
  projectTitle.value=project.title||"";
  projectCategory.value=project.category||"brand";
  projectShortDesc.value=project.short_desc||"";
  projectContent.value=project.content||"";
  projectRole.value=project.role||"";
  projectYear.value=project.project_year||"";
  projectImage.value="";
  projectDetailImages.value="";
  projectVideoFile.value="";
  projectVideoUrl.value=project.video_url||"";
  projectPdfUrl.value=project.pdf_url||"";

  detailItems=(project.detail_images||[]).map(url=>({
    type:"url",
    file:null,
    preview:url,
    url:url
  }));

  renderDetailPreview();
}

detailEditBtn.addEventListener("click",()=>{
  if(!currentProject)return;
  fillForm(currentProject);
  closeDetail();
  openAdmin();
});

checkLogin();
loadProjects();
</script>

</body>
</html>
