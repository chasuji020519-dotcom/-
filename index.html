<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Particle Logo</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#ececec;
}

.hero{
  width:100vw;
  height:100vh;
  position:relative;
}

#magnetSandCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  touch-action:none;
}
</style>
</head>
<body>

<section class="hero">
  <canvas id="magnetSandCanvas"></canvas>
</section>

<script>
const canvas=document.getElementById("magnetSandCanvas");
const ctx=canvas.getContext("2d");

let w,h,dpr;
let particles=[];
let points=[];

let mouse={
  x:-9999,
  y:-9999,
  px:-9999,
  py:-9999,
  vx:0,
  vy:0
};

const TEXT=["PORTFOLIO"];

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);

  w=window.innerWidth;
  h=window.innerHeight;

  canvas.width=w*dpr;
  canvas.height=h*dpr;

  canvas.style.width=w+"px";
  canvas.style.height=h+"px";

  ctx.setTransform(dpr,0,0,dpr,0,0);

  makePoints();
  makeParticles();
}

function makePoints(){

  points=[];

  const off=document.createElement("canvas");
  const octx=off.getContext("2d",{willReadFrequently:true});

  off.width=w;
  off.height=h;

  const fontSize=Math.min(w*0.18,h*0.22);

  octx.clearRect(0,0,w,h);

  octx.fillStyle="#fff";
  octx.textAlign="center";
  octx.textBaseline="middle";
  octx.font=`900 ${fontSize}px Arial Black, Impact, sans-serif`;

  octx.fillText(TEXT[0],w/2,h/2);

  const img=octx.getImageData(0,0,w,h).data;

  const gap=window.innerWidth<560 ? 4 : 3;

  for(let y=0;y<h;y+=gap){
    for(let x=0;x<w;x+=gap){

      const a=img[(y*w+x)*4+3];

      if(a>120 && Math.random()>0.1){
        points.push({
          x:x+(Math.random()-0.5)*1.5,
          y:y+(Math.random()-0.5)*1.5
        });
      }
    }
  }
}

function makeParticles(){

  particles=points.map(p=>({
    x:w/2+(Math.random()-0.5)*w,
    y:h/2+(Math.random()-0.5)*h,
    tx:p.x,
    ty:p.y,
    vx:0,
    vy:0,
    r:Math.random()*1.8+1.2,
    a:Math.random()*0.3+0.8,
    noise:Math.random()*0.08+0.015,
    magnet:Math.random()*0.7+0.8,
    tear:0
  }));
}

function animate(){

  ctx.clearRect(0,0,w,h);

  const speed=Math.sqrt(
    mouse.vx*mouse.vx+
    mouse.vy*mouse.vy
  );

  const dirX=mouse.vx/(speed||1);
  const dirY=mouse.vy/(speed||1);

  for(const p of particles){

    const homeX=p.tx-p.x;
    const homeY=p.ty-p.y;

    const dx=mouse.x-p.x;
    const dy=mouse.y-p.y;

    const dist=Math.sqrt(dx*dx+dy*dy)||1;

    if(dist<160){

      const t=1-dist/160;

      if(speed>10) p.tear=1;

      const pullPower=t*(7.5+speed*0.12)*p.magnet;

      p.vx+=(dx/dist)*pullPower;
      p.vy+=(dy/dist)*pullPower;

      const swirlPower=t*(8.5+speed*0.08);

      p.vx+=(-dy/dist)*swirlPower;
      p.vy+=( dx/dist)*swirlPower;

      const followPower=t*(speed*0.16+3);

      p.vx+=dirX*followPower;
      p.vy+=dirY*followPower;

    }else{

      const homeForce=p.tear>0 ? 0.004 : 0.018;

      p.vx+=homeX*homeForce;
      p.vy+=homeY*homeForce;
    }

    p.vx+=homeX*0.006;
    p.vy+=homeY*0.006;

    p.tear*=0.965;

    p.vx+=(Math.random()-0.5)*p.noise;
    p.vy+=(Math.random()-0.5)*p.noise;

    p.vx*=0.89;
    p.vy*=0.89;

    p.x+=p.vx;
    p.y+=p.vy;

    ctx.beginPath();
    ctx.fillStyle=`rgba(17,17,17,${p.a})`;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

function movePointer(x,y){

  mouse.vx=x-mouse.px;
  mouse.vy=y-mouse.py;

  mouse.x=x;
  mouse.y=y;

  mouse.px=x;
  mouse.py=y;
}

window.addEventListener("mousemove",e=>{
  movePointer(e.clientX,e.clientY);
});

window.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  if(t) movePointer(t.clientX,t.clientY);
},{passive:true});

window.addEventListener("mouseleave",()=>{
  mouse.x=-9999;
  mouse.y=-9999;
  mouse.vx=0;
  mouse.vy=0;
});

window.addEventListener("resize",resize);

resize();
animate();
</script>

</body>
</html>
