<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    font-family:"Pretendard",sans-serif;
}

.hero-title{
    font-size:clamp(42px,6vw,88px);
    font-weight:700;
    line-height:1.2;
    color:#111;
    display:flex;
    align-items:center;
    gap:16px;
}

.word-wrap{
    position:relative;
    height:1.2em;
    overflow:hidden;
}

.word-slider{
    display:flex;
    flex-direction:column;
    animation:slide 8s infinite;
}

.word{
    height:1.2em;
    display:flex;
    align-items:center;
    white-space:nowrap;
}

.fixed{
    color:#111;
}

@keyframes slide{

    0%,20%{
        transform:translateY(0%);
    }

    25%,45%{
        transform:translateY(-25%);
    }

    50%,70%{
        transform:translateY(-50%);
    }

    75%,95%{
        transform:translateY(-75%);
    }

    100%{
        transform:translateY(0%);
    }
}
</style>
</head>
<body>

<h1 class="hero-title">

    <div class="word-wrap">
        <div class="word-slider">
            <div class="word">매출내기</div>
            <div class="word">운영하기</div>
            <div class="word">성장하기</div>
            <div class="word">디자인하기</div>
        </div>
    </div>

    <span class="fixed">쉬운</span>

</h1>

</body>
</html>
