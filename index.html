<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
}

.hero{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 24px;
}

.title{
    display:grid;
    grid-template-columns:5.5em auto 5.5em;
    align-items:center;
    justify-content:center;

    font-size:clamp(56px,6vw,96px);
    font-weight:700;
    letter-spacing:-0.07em;
    color:#111;
    line-height:1;
}

.fixed{
    text-align:center;
    padding:0 .2em;
}

.box{
    width:5.5em;
    height:1.1em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 8s infinite cubic-bezier(.76,0,.24,1);
}

.word{
    height:1.1em;
    line-height:1.1em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
}

.right .word{
    text-align:left;
}

.subtitle{
    margin-top:32px;

    font-size:20px;
    font-weight:400;

    color:#8a8a8a;
    letter-spacing:-0.02em;

    text-align:center;
}

@keyframes slideText{

    0%,20%{
        transform:translateY(0);
    }

    25%,45%{
        transform:translateY(-1.1em);
    }

    50%,70%{
        transform:translateY(-2.2em);
    }

    75%,95%{
        transform:translateY(-3.3em);
    }

    100%{
        transform:translateY(0);
    }

}

@media(max-width:768px){

    .title{
        grid-template-columns:5em auto 5em;
        font-size:clamp(38px,9vw,64px);
    }

    .box{
        width:5em;
    }

    .subtitle{
        font-size:16px;
        margin-top:20px;
    }

}

</style>
</head>

<body>

<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">
                <div class="word">감각을</div>
                <div class="word">가치를</div>
                <div class="word">경험을</div>
                <div class="word">생각을</div>
            </div>
        </div>

        <span class="fixed">담은</span>

        <div class="box right">
            <div class="slider">
                <div class="word">디자인</div>
                <div class="word">퀄리티</div>
                <div class="word">임팩트</div>
                <div class="word">디테일</div>
            </div>
        </div>

    </h1>

    <p class="subtitle">
        DESIGN PORTFOLIO · CHA SUJI
    </p>

</section>

</body>
</html>
