<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
    color:#111;
    overflow:hidden;
}

.nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:32px 40px;
    z-index:999;
}

.logo{
    font-size:14px;
    font-weight:700;
    letter-spacing:.12em;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:12px;
    font-weight:500;
    letter-spacing:.08em;
}

.hero{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:90px 0 0;
    overflow:hidden;
}

.hero-content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:0 40px;
}

.title{
    width:min(1500px,100%);
    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;
    font-size:clamp(70px,7.5vw,130px);
    font-weight:700;
    letter-spacing:-0.08em;
    line-height:1;
}

.fixed{
    white-space:nowrap;
    text-align:center;
    padding:0 .2em;
}

.box{
    width:100%;
    height:1.1em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 14s infinite ease-in-out;
}

.word{
    height:1.1em;
    line-height:1.1em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
    padding-right:.08em;
}

.right .word{
    text-align:left;
    padding-left:.08em;
}

.subtitle{
    margin-top:30px;
    font-size:18px;
    color:#8a8a8a;
    letter-spacing:-0.02em;
}

@keyframes slideText{
    0%,16%{transform:translateY(0)}
    22%,38%{transform:translateY(-1.1em)}
    44%,60%{transform:translateY(-2.2em)}
    66%,82%{transform:translateY(-3.3em)}
    88%,100%{transform:translateY(-4.4em)}
}

/* 하단 이미지 영역 */
.image-marquee{
    position:relative;
    width:100%;
    overflow:hidden;
    margin:0;
    padding:0;
}

.image-marquee::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:linear-gradient(
        to bottom,
        rgba(255,255,255,1) 0%,
        rgba(255,255,255,.65) 18%,
        rgba(255,255,255,.12) 42%,
        rgba(0,0,0,.18) 100%
    );
}

.marquee-track{
    display:flex;
    gap:0;
    width:max-content;
    animation:marquee 38s linear infinite;
}

.project{
    position:relative;
    flex-shrink:0;
    margin:0;
    padding:0;
}

.project img{
    width:300px;
    height:180px;
    object-fit:cover;
    border-radius:0;
    display:block;
    filter:saturate(.9) contrast(1.05);
}

.project span{
    position:absolute;
    left:16px;
    bottom:16px;
    z-index:3;
    color:#fff;
    font-size:12px;
    font-weight:600;
    background:rgba(0,0,0,.28);
    backdrop-filter:blur(14px);
    padding:7px 11px;
    border-radius:999px;
}

@keyframes marquee{
    from{transform:translateX(0)}
    to{transform:translateX(-50%)}
}

@media(max-width:768px){

    .nav{
        padding:24px;
    }

    .menu{
        gap:15px;
    }

    .menu a{
        font-size:10px;
    }

    .hero{
        padding:80px 0 0;
    }

    .hero-content{
        padding:0 24px;
    }

    .title{
        font-size:clamp(44px,11vw,76px);
    }

    .subtitle{
        font-size:15px;
        text-align:center;
        margin-top:24px;
    }

    .project img{
        width:210px;
        height:130px;
    }

    .project span{
        font-size:10px;
        left:10px;
        bottom:10px;
    }
}
</style>
</head>

<body>

<nav class="nav">
    <div class="logo">Portfolio</div>

    <div class="menu">
        <a href="#">ABOUT</a>
        <a href="#">WORKS</a>
        <a href="#">ARCHIVE</a>
        <a href="#">CONTACT</a>
    </div>
</nav>

<section class="hero">

    <div class="hero-content">
        <h1 class="title">

            <div class="box left">
                <div class="slider">
                    <div class="word">감각을</div>
                    <div class="word">가치를</div>
                    <div class="word">경험을</div>
                    <div class="word">생각을</div>
                    <div class="word">감각을</div>
                </div>
            </div>

            <span class="fixed">담은</span>

            <div class="box right">
                <div class="slider">
                    <div class="word">디자인</div>
                    <div class="word">퀄리티</div>
                    <div class="word">임팩트</div>
                    <div class="word">디테일</div>
                    <div class="word">디자인</div>
                </div>
            </div>

        </h1>

        <p class="subtitle">
            단 한줄로 나의 브랜드를 현실로 만들어보세요
        </p>
    </div>

    <div class="image-marquee">
        <div class="marquee-track">

            <div class="project"><img src="https://i.pinimg.com/736x/19/bb/3b/19bb3beae640b3cce669de47c1169ab7.jpg"><span>Brand Design</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/43/cb/59/43cb5931f4cc90e88202d34df8614261.jpg"><span>Web Design</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/8d/62/e9/8d62e9284a322bfcdd273cf361a324d4.jpg"><span>Editorial</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/39/eb/61/39eb6170a2508af0bb7cccc7a28977e5.jpg"><span>Visual Identity</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/65/14/68/651468f340d841d9a7053d5afef7e5a7.jpg"><span>Creative Work</span></div>

            <div class="project"><img src="https://i.pinimg.com/736x/19/bb/3b/19bb3beae640b3cce669de47c1169ab7.jpg"><span>Brand Design</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/43/cb/59/43cb5931f4cc90e88202d34df8614261.jpg"><span>Web Design</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/8d/62/e9/8d62e9284a322bfcdd273cf361a324d4.jpg"><span>Editorial</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/39/eb/61/39eb6170a2508af0bb7cccc7a28977e5.jpg"><span>Visual Identity</span></div>
            <div class="project"><img src="https://i.pinimg.com/736x/65/14/68/651468f340d841d9a7053d5afef7e5a7.jpg"><span>Creative Work</span></div>

        </div>
    </div>

</section>

</body>
</html>
