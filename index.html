<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Motion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
}

.hero-title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    font-size:clamp(36px,6vw,90px);
    font-weight:700;
    letter-spacing:-0.06em;
    color:#111;
}

.fixed{
    flex-shrink:0;
}

.slot{
    position:relative;
    height:1.1em;
    overflow:hidden;
}

.left{
    width:5em;
    text-align:right;
}

.right{
    width:4em;
    text-align:left;
}

.item{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;

    opacity:0;
    transform:translateY(-120%);

    animation:wordMotion 8s infinite;
}

.left .item{
    justify-content:flex-end;
}

.right .item{
    justify-content:flex-start;
}

.delay1{
    animation-delay:0s;
}

.delay2{
    animation-delay:2s;
}

.delay3{
    animation-delay:4s;
}

.delay4{
    animation-delay:6s;
}

@keyframes wordMotion{

    0%{
        opacity:0;
        transform:translateY(-120%);
    }

    8%{
        opacity:1;
        transform:translateY(0%);
    }

    32%{
        opacity:1;
        transform:translateY(0%);
    }

    40%{
        opacity:0;
        transform:translateY(120%);
    }

    100%{
        opacity:0;
        transform:translateY(120%);
    }

}

</style>
</head>
<body>

<h1 class="hero-title">

    <div class="slot left">

        <span class="item delay1">매출내기</span>
        <span class="item delay2">운영하기</span>
        <span class="item delay3">성장하기</span>
        <span class="item delay4">디자인하기</span>

    </div>

    <span class="fixed">쉬운</span>

    <div class="slot right">

        <span class="item delay1">브랜드</span>
        <span class="item delay2">쇼핑몰</span>
        <span class="item delay3">브랜드</span>
        <span class="item delay4">자사몰</span>

    </div>

</h1>

</body>
</html>
