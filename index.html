<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Particle Logo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#fff;
overflow:hidden;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];
let mouse = {
x:null,
y:null,
radius:120
};

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
createText();
}

window.addEventListener("resize", resize);

window.addEventListener("mousemove", e=>{
mouse.x = e.x;
mouse.y = e.y;
});

window.addEventListener("mouseleave", ()=>{
mouse.x = null;
mouse.y = null;
});

class Particle{
constructor(x,y){
this.x = Math.random()*canvas.width;
this.y = Math.random()*canvas.height;

this.baseX = x;
this.baseY = y;

this.size = 1.6;

this.density = Math.random()*20+5;
}

draw(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}

update(){

let dx = mouse.x - this.x;
let dy = mouse.y - this.y;
let distance = Math.sqrt(dx*dx+dy*dy);

if(distance < mouse.radius){

let force = (mouse.radius-distance)/mouse.radius;

let dirX = dx/distance;
let dirY = dy/distance;

this.x -= dirX*force*8;
this.y -= dirY*force*8;

}else{

this.x += (this.baseX-this.x)*0.08;
this.y += (this.baseY-this.y)*0.08;

}

this.draw();
}
}

function createText(){

particles=[];

ctx.clearRect(0,0,canvas.width,canvas.height);

const text = "CHASUJI";

const fontSize = Math.min(canvas.width*0.12,180);

ctx.fillStyle="#000";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.font=`900 ${fontSize}px Arial Black`;

ctx.fillText(
text,
canvas.width/2,
canvas.height/2
);

const data = ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<data.height;y+=4){

for(let x=0;x<data.width;x+=4){

const index=(y*4*data.width)+(x*4);

if(data.data[index+3]>128){

particles.push(
new Particle(x,y)
);

}

}
}
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){
particles[i].update();
}

requestAnimationFrame(animate);
}

resize();
animate();

</script>

</body>
</html>
