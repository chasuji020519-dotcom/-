<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* =========================
   RESET / VARIABLES
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#ffffff;
  --text:#111111;
  --sub:#8a8a8a;

  --panel:rgba(255,255,255,.62);
  --panel-border:rgba(255,255,255,.82);

  --card:rgba(255,255,255,.5);
  --card-border:rgba(0,0,0,.08);

  --muted:rgba(0,0,0,.58);

  --button:#111111;
  --button-text:#ffffff;

  --shadow:0 24px 70px rgba(0,0,0,.12);

  --marquee-gradient:
    linear-gradient(
      to bottom,
      rgba(255,255,255,1) 0%,
      rgba(255,255,255,.72) 18%,
      rgba(255,255,255,.18) 46%,
      rgba(0,0,0,.16) 100%
    );
}

body.dark-mode{
  --bg:#111111;
  --text:#f5f5f5;
  --sub:rgba(255,255,255,.55);

  --panel:rgba(20,20,20,.66);
  --panel-border:rgba(255,255,255,.13);

  --card:rgba(255,255,255,.08);
  --card-border:rgba(255,255,255,.14);

  --muted:rgba(255,255,255,.6);

  --button:#ffffff;
  --button-text:#111111;

  --shadow:0 24px 80px rgba(0,0,0,.4);

  --marquee-gradient:
    linear-gradient(
      to bottom,
      rgba(17,17,17,1) 0%,
      rgba(17,17,17,.78) 18%,
      rgba(17,17,17,.24) 46%,
      rgba(255,255,255,.08) 100%
    );
}

html{
  scroll-behavior:smooth;
  scroll-snap-type:y mandatory;
  scroll-padding-top:105px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
  overflow-x:hidden;
  overscroll-behavior-y:contain;
  transition:background .35s ease,color .35s ease;
}

button,
input,
textarea,
select{
  font-family:inherit;
}

/* =========================
   CATEGORY MODE
========================= */
body.category-mode{
  overflow:hidden;
}

body.category-mode .main-fixed,
body.category-mode .about-panel,
body.category-mode .about-hold,
body.category-mode .nav{
  display:none;
}

body.category-mode .scroll-area{
  position:fixed;
  inset:0;
  z-index:1000;
  margin-top:0;
  overflow-y:auto;
  background:var(--bg);
}

body.category-mode .category-panel{
  min-height:100vh;
  padding-top:70px;
  box-shadow:none;
  border-top:none;
  scroll-snap-align:none;
}

.back-home-zone{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:105px;
  z-index:900;
  pointer-events:none;
}

.back-home-zone.active{
  pointer-events:auto;
}

body.category-mode .back-home-zone{
  display:none;
}

/* =========================
   NAV / HERO
========================= */
.main-fixed{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  z-index:1;
  background:var(--bg);
  overflow:hidden;
  scroll-snap-align:start;
}

.nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:32px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.logo{
  font-size:24px;
  font-weight:700;
  letter-spacing:.12em;
  color:var(--text);
  text-decoration:none;
}

.dark-toggle{
  width:46px;
  height:46px;
  border:0;
  border-radius:50%;
  background:var(--button);
  color:var(--button-text);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(0,0,0,.14);
  transition:.3s ease;
}

.dark-toggle:hover{
  transform:translateY(-2px);
}

.hero{
  width:100%;
  height:100vh;
  padding-top:90px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero-content{
  flex:1;
  width:100%;
  padding:0 40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  width:min(1500px,100%);
  display:grid;
  grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
  align-items:center;
  font-size:clamp(70px,7.5vw,130px);
  line-height:1;
  font-weight:700;
  letter-spacing:-.08em;
}

.fixed{
  padding:0 .2em;
  white-space:nowrap;
  text-align:center;
}

.box{
  width:100%;
  height:1.1em;
  overflow:hidden;
}

.slider{
  display:flex;
  flex-direction:column;
  animation:slideText 14s infinite ease-in-out;
}

.word{
  height:1.1em;
  line-height:1.1em;
  white-space:nowrap;
}

.left .word{
  text-align:right;
  padding-right:.08em;
}

.right .word{
  text-align:left;
  padding-left:.08em;
}

.subtitle{
  margin-top:30px;
  font-size:18px;
  color:var(--sub);
  letter-spacing:-.02em;
}

@keyframes slideText{
  0%,16%{transform:translateY(0)}
  22%,38%{transform:translateY(-1.1em)}
  44%,60%{transform:translateY(-2.2em)}
  66%,82%{transform:translateY(-3.3em)}
  88%,100%{transform:translateY(-4.4em)}
}

/* =========================
   IMAGE MARQUEE
========================= */
.image-marquee{
  position:relative;
  width:100%;
  overflow:hidden;
}

.image-marquee::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:var(--marquee-gradient);
  transition:background .35s ease;
}

.marquee-track{
  width:max-content;
  display:flex;
  animation:marquee 38s linear infinite;
}

.project{
  flex-shrink:0;
  width:300px;
  height:200px;
  overflow:hidden;
}

.project img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(.9) contrast(1.05);
}

@keyframes marquee{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* =========================
   PANELS
========================= */
.scroll-area{
  position:relative;
  z-index:5;
  margin-top:100vh;
  background:var(--bg);
}

.about-panel,
.category-panel{
  width:100%;
  padding:70px 40px;
  background:var(--panel);
  border-top:1px solid var(--panel-border);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  box-shadow:0 -30px 90px rgba(0,0,0,.12);
  scroll-snap-align:start;
  scroll-snap-stop:always;
}

.about-panel{
  position:sticky;
  top:105px;
  z-index:1;
  min-height:calc(100vh - 105px);
}

.about-hold{
  height:1px;
}

.category-panel{
  position:relative;
  z-index:3;
  min-height:calc(100vh - 105px);
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 18% 20%,rgba(255,255,255,.55),transparent 28%),
    radial-gradient(circle at 82% 72%,rgba(180,180,180,.18),transparent 34%),
    var(--panel);
}

body.dark-mode .category-panel{
  background:
    radial-gradient(circle at 18% 20%,rgba(255,255,255,.08),transparent 28%),
    radial-gradient(circle at 82% 72%,rgba(255,255,255,.05),transparent 34%),
    var(--panel);
}

.category-panel.opened{
  align-items:flex-start;
}

.panel-inner{
  width:100%;
  max-width:1180px;
  margin:0 auto;
}

.panel-title{
  margin-bottom:16px;
  font-size:clamp(34px,4vw,62px);
  line-height:.95;
  letter-spacing:-.075em;
  color:var(--text);
}

.panel-desc{
  max-width:650px;
  font-size:16px;
  line-height:1.75;
  color:var(--muted);
}

/* =========================
   ABOUT
========================= */
.about-layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:48px;
  align-items:start;
}

.profile-card{
  overflow:hidden;
  border-radius:22px;
  background:var(--card);
  border:1px solid var(--panel-border);
  box-shadow:var(--shadow);
}

.profile-img{
  width:100%;
  height:360px;
  background:#eee;
  overflow:hidden;
}

.profile-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.profile-info{
  padding:22px;
}

.profile-info h3{
  margin-bottom:8px;
  font-size:22px;
  letter-spacing:-.04em;
}

.profile-info p{
  font-size:13px;
  line-height:1.65;
  color:var(--muted);
}

.keyword-row{
  margin-top:24px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.keyword{
  padding:8px 14px;
  border-radius:999px;
  background:var(--card);
  border:1px solid var(--card-border);
  font-size:12px;
  color:var(--muted);
}

.panel-cards{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  min-height:145px;
  padding:22px;
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--panel-border);
  box-shadow:0 14px 40px rgba(0,0,0,.06);
}

.card span{
  display:block;
  margin-bottom:22px;
  font-size:11px;
  color:var(--sub);
}

.card h3{
  margin-bottom:10px;
  font-size:21px;
  letter-spacing:-.04em;
}

.card p{
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
}

/* =========================
   CATEGORY HEAD
========================= */
.category-panel:not(.opened) .panel-inner{
  min-height:calc(100vh - 245px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.category-head{
  text-align:center;
  transition:.65s cubic-bezier(.22,1,.36,1);
}

.category-panel.opened .category-head{
  text-align:left;
}

.category-title-row{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  transition:.65s cubic-bezier(.22,1,.36,1);
}

.category-panel.opened .category-title-row{
  justify-content:space-between;
}

.category-title-row .panel-title{
  margin-bottom:0;
}

.category-head .panel-desc{
  margin:16px auto 0;
}

.category-panel.opened .category-head .panel-desc{
  margin-left:0;
}

.category-small{
  margin-top:16px;
  font-size:13px;
  color:var(--sub);
  letter-spacing:.08em;
}

.category-actions{
  display:none;
  align-items:center;
  gap:10px;
}

.category-panel.opened .category-actions{
  display:flex;
}

.category-add-btn,
.category-back-btn{
  width:54px;
  height:54px;
  border:0;
  cursor:pointer;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s ease;
}

.category-add-btn{
  border-radius:50%;
  background:var(--button);
  color:var(--button-text);
  font-size:34px;
  font-weight:200;
  line-height:1;
  box-shadow:0 12px 30px rgba(0,0,0,.16);
}

.category-back-btn{
  background:transparent;
}

.category-add-btn:hover,
.category-back-btn:hover{
  transform:translateY(-2px);
}

.category-back-btn svg{
  width:42px;
  height:42px;
}

.category-back-btn path{
  fill:none;
  stroke:var(--text);
  stroke-width:3.2;
  stroke-linecap:square;
  stroke-linejoin:miter;
}

/* =========================
   GLASS CATEGORY TABS
========================= */
.category-buttons{
  position:relative;
  width:max-content;
  margin:34px auto 0;
  padding:9px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
  overflow:hidden;
  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.74),
      rgba(255,255,255,.28) 42%,
      rgba(255,255,255,.12)
    );

  border:1px solid rgba(255,255,255,.78);

  backdrop-filter:blur(38px) saturate(220%);
  -webkit-backdrop-filter:blur(38px) saturate(220%);

  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.95),
    inset 0 -1px 2px rgba(255,255,255,.3),
    0 20px 60px rgba(0,0,0,.16);

  transition:.35s ease;
}

.category-panel.opened .category-buttons{
  margin-left:0;
  margin-right:auto;
}

.category-buttons::before{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:inherit;
  pointer-events:none;
  background:
    radial-gradient(circle at 18% 12%,rgba(255,255,255,.95),transparent 26%),
    radial-gradient(circle at 82% 88%,rgba(255,255,255,.28),transparent 30%);
  z-index:0;
}

body.dark-mode .category-buttons{
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.18),
      rgba(255,255,255,.08) 42%,
      rgba(255,255,255,.03)
    );
  border-color:rgba(255,255,255,.22);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.24),
    0 22px 65px rgba(0,0,0,.46);
}

body.category-mode .category-buttons{
  position:sticky;
  top:18px;
  z-index:100;
  margin-bottom:22px;
}

.glass-indicator{
  position:absolute;
  top:9px;
  left:9px;
  width:70px;
  height:46px;
  border-radius:999px;
  z-index:1;
  pointer-events:none;

  background:
    radial-gradient(
      circle at 28% 18%,
      rgba(255,255,255,1),
      rgba(255,255,255,.7) 18%,
      rgba(255,255,255,.28) 48%,
      rgba(255,255,255,.08)
    ),
    linear-gradient(145deg,rgba(255,255,255,.86),rgba(255,255,255,.26));

  border:1px solid rgba(255,255,255,.84);

  backdrop-filter:blur(24px) saturate(260%);
  -webkit-backdrop-filter:blur(24px) saturate(260%);

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,1),
    inset 0 -1px 2px rgba(255,255,255,.5),
    0 10px 28px rgba(0,0,0,.18);

  transform:translateX(0);
  transition:
    transform .45s cubic-bezier(.22,1,.36,1),
    width .45s cubic-bezier(.22,1,.36,1),
    background .35s ease,
    box-shadow .35s ease;
}

.glass-indicator::before{
  content:"";
  position:absolute;
  top:7px;
  left:17px;
  width:34px;
  height:9px;
  border-radius:999px;
  background:rgba(255,255,255,.86);
  filter:blur(.3px);
}

.category-btn{
  position:relative;
  z-index:2;
  border:0;
  outline:0;
  cursor:pointer;
  padding:13px 26px;
  border-radius:999px;
  background:transparent;
  color:var(--text);
  font-size:15px;
  font-weight:700;
  letter-spacing:-.035em;
  white-space:nowrap;
  transition:.28s ease;
}

.category-btn:hover{
  transform:translateY(-1px);
}

.category-btn.active{
  color:#111;
}

/* compact tabs after scroll */
body.category-mode.tabs-compact .category-buttons{
  padding:6px;
  gap:8px;
  background:transparent;
  border-color:transparent;
  box-shadow:none;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
}

body.category-mode.tabs-compact .category-buttons::before{
  opacity:0;
}

body.category-mode.tabs-compact .glass-indicator{
  top:6px;
  left:6px;
  height:46px;
  background:
    radial-gradient(circle at 30% 18%,rgba(255,255,255,.95),rgba(255,255,255,.62) 36%,rgba(255,255,255,.34)),
    linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.34));
  border:1px solid rgba(255,255,255,.86);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.95),
    0 10px 28px rgba(0,0,0,.18);
}

body.category-mode.tabs-compact .category-btn{
  background:
    linear-gradient(145deg,rgba(0,0,0,.42),rgba(0,0,0,.22));
  border:1px solid rgba(255,255,255,.16);
  color:rgba(255,255,255,.72);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.18),
    0 8px 22px rgba(0,0,0,.14);
}

body.category-mode.tabs-compact .category-btn.active{
  background:transparent;
  color:#111;
}

body.dark-mode.category-mode.tabs-compact .category-btn{
  background:
    linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.05));
  border-color:rgba(255,255,255,.14);
  color:rgba(255,255,255,.62);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.12),
    0 8px 24px rgba(0,0,0,.32);
}

body.dark-mode.category-mode.tabs-compact .category-btn.active{
  background:transparent;
  color:#111;
}

/* =========================
   PROJECT LIST
========================= */
.product-list{
  position:relative;
  margin-top:40px;
  min-height:620px;
}

.category-panel:not(.opened) .product-list{
  display:none;
}

.product-group{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  opacity:0;
  visibility:hidden;
  transform:translateY(32px);
  pointer-events:none;
  transition:.65s cubic-bezier(.22,1,.36,1);
}

.product-group.active{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
  pointer-events:auto;
}

.product-list.all-active{
  min-height:0;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:28px;
}

.product-list.all-active .product-group{
  display:contents;
}

.product-item{
  position:relative;
  height:310px;
  overflow:hidden;
  border-radius:18px;
  background:#eee;
  box-shadow:0 20px 55px rgba(0,0,0,.1);
  cursor:pointer;
}

.product-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.45s ease;
}

.product-item:hover img{
  transform:scale(1.06);
}

.product-info{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  padding:22px;
  color:#fff;
  background:linear-gradient(to top,rgba(0,0,0,.62),transparent);
}

.product-info h4{
  font-size:20px;
  letter-spacing:-.04em;
}

.product-info p{
  margin-top:5px;
  font-size:13px;
  opacity:.82;
}

/* =========================
   DETAIL / ADMIN MODAL
========================= */
.detail-overlay,
.admin-overlay{
  position:fixed;
  inset:0;
  z-index:5000;
  display:flex;
  align-items:flex-end;
  background:rgba(0,0,0,.24);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  visibility:hidden;
  transition:.35s ease;
}

.detail-overlay.show,
.admin-overlay.show{
  opacity:1;
  visibility:visible;
}

.detail-panel,
.admin-panel{
  width:100%;
  height:88vh;
  max-height:100vh;
  overflow-y:auto;
  border-radius:38px 38px 0 0;
  background:var(--panel);
  color:var(--text);
  box-shadow:0 -30px 90px rgba(0,0,0,.2);
  transform:translateY(100%);
  scroll-behavior:smooth;
  transition:
    transform .7s cubic-bezier(.22,1,.36,1),
    height .45s cubic-bezier(.22,1,.36,1),
    border-radius .45s cubic-bezier(.22,1,.36,1);
}

.detail-overlay.show .detail-panel,
.admin-overlay.show .admin-panel{
  transform:translateY(0);
}

.detail-overlay.full .detail-panel,
.admin-overlay.full .admin-panel{
  height:100vh;
  border-radius:0;
}

.detail-close,
.admin-close{
  position:sticky;
  top:22px;
  z-index:20;
  width:48px;
  height:48px;
  margin:22px 24px 0 auto;
  border:0;
  border-radius:50%;
  background:var(--button);
  color:var(--button-text);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.detail-close svg,
.admin-close svg{
  width:22px;
  height:22px;
}

.detail-close path,
.admin-close path{
  fill:none;
  stroke:var(--button-text);
  stroke-width:2;
  stroke-linecap:round;
}

.detail-image{
  width:100%;
  max-width:1050px;
  margin:40px auto 0;
  padding:0 40px;
}

.detail-image img{
  width:100%;
  max-height:520px;
  object-fit:contain;
  display:block;
  border-radius:32px;
  background:#f3f3f3;
}

.detail-content,
.admin-content{
  max-width:1050px;
  margin:0 auto;
  padding:58px 40px 120px;
}

.detail-category{
  display:block;
  margin-bottom:16px;
  font-size:12px;
  letter-spacing:.16em;
  color:var(--sub);

  const tabsRect=glassTabs.getBoundingClientRect();
  const btnRect=target.getBoundingClientRect();

  const offset=document.body.classList.contains("tabs-compact") ? 6 : 9;
  const left=btnRect.left-tabsRect.left;
  const width=btnRect.width;

  glassIndicator.style.transform=`translateX(${left-offset}px)`;
  glassIndicator.style.width=`${width}px`;
}

function updateCategoryCompactMode(){
  if(!document.body.classList.contains("category-mode")){
    document.body.classList.remove("tabs-compact");
    return;
  }

  if(scrollArea.scrollTop>90){
    document.body.classList.add("tabs-compact");
  }else{
    document.body.classList.remove("tabs-compact");
  }

  moveGlassIndicator(getActiveCategoryButton());
}

window.addEventListener("load",()=>{
  moveGlassIndicator(getActiveCategoryButton());
});

window.addEventListener("resize",()=>{
  moveGlassIndicator(getActiveCategoryButton());
});

scrollArea.addEventListener("scroll",updateCategoryCompactMode);

buttons.forEach(button=>{
  button.addEventListener("pointerenter",()=>moveGlassIndicator(button));
  button.addEventListener("pointermove",()=>moveGlassIndicator(button));
});

glassTabs.addEventListener("pointerleave",()=>{
  moveGlassIndicator(getActiveCategoryButton());
});

glassTabs.addEventListener("scroll",()=>{
  moveGlassIndicator(getActiveCategoryButton());
});

/* =========================
   CATEGORY
========================= */
function resetCategoryView(){
  buttons.forEach(button=>button.classList.remove("active"));
  groups.forEach(group=>group.classList.remove("active"));
  productList.classList.remove("all-active");
}

function openCategory(tabButton){
  const target=tabButton.dataset.tab;

  document.body.classList.add("category-mode");
  document.body.classList.remove("tabs-compact");

  categoryPanel.classList.add("opened");
  scrollArea.scrollTo({top:0,behavior:"smooth"});

  resetCategoryView();

  tabButton.classList.add("active");
  moveGlassIndicator(tabButton);

  if(target==="all"){
    productList.classList.add("all-active");
    groups.forEach(group=>group.classList.add("active"));
  }else{
    const selected=document.querySelector(`[data-category="${target}"]`);
    if(selected) selected.classList.add("active");
  }

  setTimeout(()=>{
    moveGlassIndicator(tabButton);
    updateCategoryCompactMode();
  },120);
}

buttons.forEach(button=>{
  button.addEventListener("click",()=>openCategory(button));
});

categoryBackBtn.addEventListener("click",()=>{
  document.body.classList.remove("category-mode");
  document.body.classList.remove("tabs-compact");

  categoryPanel.classList.remove("opened");

  resetCategoryView();
  buttons[0].classList.add("active");

  window.scrollTo({top:0,behavior:"smooth"});

  setTimeout(()=>{
    moveGlassIndicator(buttons[0]);
  },400);
});

window.addEventListener("scroll",()=>{
  backZone.classList.toggle("active",window.scrollY>300);
});

backZone.addEventListener("click",()=>{
  window.scrollTo({top:0,behavior:"smooth"});
});

/* =========================
   DETAIL MODAL
========================= */
function closeDetail(){
  detailOverlay.classList.remove("show","full");
  detailPanel.scrollTop=0;
}

function openDetail(project){
  currentProject=project;

  detailImg.src=project.image_url || "";
  detailTitle.innerText=project.title || "Untitled";
  detailDesc.innerText=project.short_desc || "";
  detailType.innerText=project.category || "";
  detailRole.innerText=project.role || "Design / Visual";
  detailYear.innerText=project.project_year || "2026";
  detailStory.innerText=project.content || "상세 설명이 아직 없습니다.";

  detailGallery.innerHTML="";
  detailMedia.innerHTML="";
  detailLinks.innerHTML="";

  (project.detail_images || []).forEach(url=>{
    detailGallery.innerHTML+=`
      <img src="${url}" alt="detail image">
    `;
  });

  if(project.video_url){
    if(/\.(gif)(\?.*)?$/i.test(project.video_url)){
      detailMedia.innerHTML+=`
        <img src="${project.video_url}" alt="gif image">
      `;
    }else if(/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(project.video_url)){
      detailMedia.innerHTML+=`
        <video src="${project.video_url}" controls muted loop playsinline></video>
      `;
    }else{
      detailLinks.innerHTML+=`
        <a href="${project.video_url}" target="_blank">영상 보기</a>
      `;
    }
  }

  if(project.pdf_url){
    detailLinks.innerHTML+=`
      <a href="${project.pdf_url}" target="_blank">PDF / 외부 링크</a>
    `;
  }

  detailPanel.scrollTop=0;
  detailOverlay.classList.remove("full");
  detailOverlay.classList.add("show");
}

detailPanel.addEventListener("scroll",()=>{
  detailOverlay.classList.toggle("full",detailPanel.scrollTop>35);
});

detailClose.addEventListener("click",closeDetail);

detailOverlay.addEventListener("click",(e)=>{
  if(e.target===detailOverlay) closeDetail();
});

/* =========================
   ADMIN MODAL
========================= */
function openAdmin(){
  adminOverlay.classList.add("show");
  adminOverlay.classList.remove("full");
  adminPanel.scrollTop=0;
}

function closeAdmin(){
  adminOverlay.classList.remove("show","full");
  adminPanel.scrollTop=0;
}

adminPanel.addEventListener("scroll",()=>{
  adminOverlay.classList.toggle("full",adminPanel.scrollTop>35);
});

categoryAddBtn.addEventListener("click",()=>{
  resetForm();
  openAdmin();
});

adminClose.addEventListener("click",closeAdmin);

adminOverlay.addEventListener("click",(e)=>{
  if(e.target===adminOverlay) closeAdmin();
});

/* =========================
   LOGIN
========================= */
async function checkLogin(){
  const {data}=await client.auth.getSession();

  if(data.session){
    document.body.classList.add("logged-in");
  }else{
    document.body.classList.remove("logged-in");
  }
}

document.getElementById("loginBtn").addEventListener("click",async()=>{
  const email=document.getElementById("loginEmail").value;
  const password=document.getElementById("loginPassword").value;

  const {error}=await client.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("로그인 실패: "+error.message);
    return;
  }

  await checkLogin();
  resetForm();
});

document.getElementById("logoutBtn").addEventListener("click",async()=>{
  await client.auth.signOut();
  document.body.classList.remove("logged-in");
  closeAdmin();
});

/* =========================
   PROJECT LOAD / RENDER
========================= */
function makeCard(project){
  return `
    <div class="product-item" data-id="${project.id}">
      <img src="${project.image_url || ""}" alt="${project.title || ""}">
      <div class="product-info">
        <h4>${project.title || "Untitled"}</h4>
        <p>${project.short_desc || ""}</p>
      </div>
    </div>
  `;
}

async function loadProjects(){
  const {data,error}=await client
    .from("projects")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    console.log(error);
    return;
  }

  allProjects=data || [];

  groups.forEach(group=>{
    group.innerHTML="";
  });

  allProjects.forEach(project=>{
    const group=document.querySelector(`[data-category="${project.category}"]`);

    if(group){
      group.innerHTML+=makeCard(project);
    }
  });

  document.querySelectorAll(".product-item").forEach(item=>{
    item.addEventListener("click",()=>{
      const id=Number(item.dataset.id);
      const project=allProjects.find(project=>project.id===id);

      if(project){
        openDetail(project);
      }
    });
  });
}

/* =========================
   UPLOAD
========================= */
async function uploadImage(){
  const file=projectImage.files[0];
  if(!file) return null;

  const fileName=`${Date.now()}-${file.name}`;

  const {error}=await client
    .storage
    .from("portfolio")
    .upload(fileName,file);

  if(error){
    alert("대표 이미지 업로드 실패: "+error.message);
    return null;
  }

  const {data}=client
    .storage
    .from("portfolio")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function uploadVideoFile(){
  const file=projectVideoFile.files[0];
  if(!file) return null;

  const fileName=`${Date.now()}-${file.name}`;

  const {error}=await client
    .storage
    .from("portfolio")
    .upload(fileName,file);

  if(error){
    alert("영상/움짤 업로드 실패: "+error.message);
    return null;
  }

  const {data}=client
    .storage
    .from("portfolio")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function uploadDetailImages(){
  if(!detailItems.length) return null;

  const urls=[];

  for(const item of detailItems){
    if(item.type==="url"){
      urls.push(item.url);
      continue;
    }

    const file=item.file;
    const fileName=`${Date.now()}-${Math.random().toString(36).slice(2)}-${file.name}`;

    const {error}=await client
      .storage
      .from("portfolio")
      .upload(fileName,file);

    if(error){
      alert("상세 이미지 업로드 실패: "+error.message);
      return null;
    }

    const {data}=client
      .storage
      .from("portfolio")
      .getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

/* =========================
   DETAIL IMAGE PREVIEW
========================= */
function renderDetailPreview(){
  detailPreviewList.innerHTML="";

  detailItems.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="detail-preview-item";
    div.draggable=true;
    div.dataset.index=index;

    div.innerHTML=`
      <img src="${item.preview}" alt="preview image">
      <button type="button">×</button>
      <span>${index+1}</span>
    `;

    div.querySelector("button").addEventListener("click",()=>{
      detailItems.splice(index,1);
      renderDetailPreview();
    });

    div.addEventListener("dragstart",()=>{
      draggedIndex=index;
      div.classList.add("dragging");
    });

    div.addEventListener("dragend",()=>{
      draggedIndex=null;
      div.classList.remove("dragging");
    });

    div.addEventListener("dragover",(e)=>e.preventDefault());

    div.addEventListener("drop",(e)=>{
      e.preventDefault();

      const targetIndex=Number(div.dataset.index);

      if(draggedIndex===null || draggedIndex===targetIndex) return;

      const movedItem=detailItems.splice(draggedIndex,1)[0];
      detailItems.splice(targetIndex,0,movedItem);

      renderDetailPreview();
    });

    detailPreviewList.appendChild(div);
  });
}

projectDetailImages.addEventListener("change",(e)=>{
  const files=Array.from(e.target.files);

  files.forEach(file=>{
    detailItems.push({
      type:"file",
      file:file,
      preview:URL.createObjectURL(file),
      url:null
    });
  });

  projectDetailImages.value="";
  renderDetailPreview();
});

/* =========================
   SAVE / EDIT / DELETE
========================= */
document.getElementById("saveBtn").addEventListener("click",async()=>{
  if(!projectTitle.value){
    alert("제목을 입력해줘");
    return;
  }

  adminStatus.innerText="저장 중...";

  const imageUrl=await uploadImage();
  const detailImages=await uploadDetailImages();
  const videoFileUrl=await uploadVideoFile();

  const projectData={
    title:projectTitle.value,
    category:projectCategory.value,
    short_desc:projectShortDesc.value,
    content:projectContent.value,
    role:projectRole.value,
    project_year:projectYear.value,
    video_url:videoFileUrl || projectVideoUrl.value,
    pdf_url:projectPdfUrl.value
  };

  if(imageUrl){
    projectData.image_url=imageUrl;
  }

  if(detailImages){
    projectData.detail_images=detailImages;
  }

  let result;

  if(editId.value){
    result=await client
      .from("projects")
      .update(projectData)
      .eq("id",editId.value);
  }else{
    result=await client
      .from("projects")
      .insert(projectData);
  }

  if(result.error){
    adminStatus.innerText="";
    alert("저장 실패: "+result.error.message);
    return;
  }

  adminStatus.innerText="저장 완료!";

  await loadProjects();
  resetForm();
});

document.getElementById("resetBtn").addEventListener("click",resetForm);

document.getElementById("deleteBtn").addEventListener("click",async()=>{
  if(!editId.value){
    alert("삭제할 게시물이 없어");
    return;
  }

  if(!confirm("정말 삭제할까?")) return;

  const {error}=await client
    .from("projects")
    .delete()
    .eq("id",editId.value);

  if(error){
    alert("삭제 실패: "+error.message);
    return;
  }

  alert("삭제 완료");

  resetForm();
  closeAdmin();
  closeDetail();

  await loadProjects();
});

function resetForm(){
  adminTitle.innerText="ADD PROJECT";

  editId.value="";
  projectTitle.value="";
  projectCategory.value="brand";
  projectShortDesc.value="";
  projectContent.value="";
  projectRole.value="";
  projectYear.value="";
  projectImage.value="";
  projectDetailImages.value="";
  projectVideoFile.value="";
  projectVideoUrl.value="";
  projectPdfUrl.value="";
  adminStatus.innerText="";

  detailItems=[];
  renderDetailPreview();
}

function fillForm(project){
  adminTitle.innerText="EDIT PROJECT";

  editId.value=project.id;
  projectTitle.value=project.title || "";
  projectCategory.value=project.category || "brand";
  projectShortDesc.value=project.short_desc || "";
  projectContent.value=project.content || "";
  projectRole.value=project.role || "";
  projectYear.value=project.project_year || "";
  projectImage.value="";
  projectDetailImages.value="";
  projectVideoFile.value="";
  projectVideoUrl.value=project.video_url || "";
  projectPdfUrl.value=project.pdf_url || "";

  detailItems=(project.detail_images || []).map(url=>({
    type:"url",
    file:null,
    preview:url,
    url:url
  }));

  renderDetailPreview();
}

detailEditBtn.addEventListener("click",()=>{
  if(!currentProject) return;

  fillForm(currentProject);
  closeDetail();
  openAdmin();
});

/* =========================
   INIT
========================= */
checkLogin();
loadProjects();

setTimeout(()=>{
  moveGlassIndicator(getActiveCategoryButton());
},300);
</script>
