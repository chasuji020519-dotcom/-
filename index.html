<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
    color:#111;
}

.hero{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 24px;
    overflow:hidden;
}

.title{
    display:grid;
    grid-template-columns:5.5em auto 5.5em;
    align-items:center;
    justify-content:center;

    font-size:clamp(72px,8vw,130px);
    font-weight:700;
    letter-spacing:-0.075em;
    color:#111;
    line-height:1;
}

.fixed{
    text-align:center;
    padding:0 .22em;
}

.box{
    width:5.5em;
    height:1.1em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 12s infinite ease-in-out;
    will-change:transform;
}

.word{
    height:1.1em;
    line-height:1.1em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
}

.right .word{
    text-align:left;
}

.subtitle{
    margin-top:34px;

    font-size:20px;
    font-weight:400;

    color:#8a8a8a;
    letter-spacing:-0.02em;

    text-align:center;
}

@keyframes slideText{

    0%,18%{
        transform:translateY(0);
    }

    25%,43%{
        transform:translateY(-1.1em);
    }

    50%,68%{
        transform:translateY(-2.2em);
    }

    75%,93%{
        transform:translateY(-3.3em);
    }

    100%{
        transform:translateY(0);
    }

}

@media(max-width:768px){

    .title{
        grid-template-columns:5em auto 5em;
        font-size:clamp(48px,10vw,82px);
        letter-spacing:-0.07em;
    }

    .box{
        width:5em;
    }

    .subtitle{
        font-size:16px;
        margin-top:22px;
    }

}

@media(max-width:480px){

    .hero{
        padding:0 16px;
    }

    .title{
        grid-template-columns:4.6em auto 4.6em;
        font-size:clamp(40px,11vw,60px);
    }

    .box{
        width:4.6em;
    }

    .fixed{
        padding:0 .15em;
    }

}

</style>
</head>

<body>

<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">
                <div class="word">생각을</div>
                <div class="word">경험을</div>
                <div class="word">가치를</div>
                <div class="word">브랜드를</div>
            </div>
        </div>

        <span class="fixed">담다</span>

        <div class="box right">
            <div class="slider">
                <div class="word">디자인</div>
                <div class="word">만들다</div>
                <div class="word">전하다</div>
                <div class="word">그리다</div>
            </div>
        </div>

    </h1>

    <p class="subtitle">
        Visual Designer · UI/UX · Branding
    </p>

</section>

</body>
</html>
