<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SJ*5 PORTFOLIO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #ececec;
      --text: #111111;
      --sub-text: #666666;
      --button-bg: rgba(255,255,255,0.92);
      --button-border: rgba(0,0,0,0.08);
      --menu-hover: rgba(0,0,0,0.06);
      --shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    body.dark-mode {
      --bg: #111111;
      --text: #f5f5f5;
      --sub-text: #cfcfcf;
      --button-bg: rgba(255,255,255,0.08);
      --button-border: rgba(255,255,255,0.12);
      --menu-hover: rgba(255,255,255,0.08);
      --shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.25s ease, color 0.25s ease;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .site-wrap {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      z-index: 100;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .sj-logo {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.07em;
      color: var(--text);
      line-height: 1;
    }

    .gnb-area {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      margin-left: auto;
      padding-right: 28px;
    }

    .gnb {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      width: auto;
    }

    .gnb a {
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      transition: transform 0.2s ease, background 0.2s ease, color 0.25s ease;
    }

    .gnb a:hover {
      background: var(--menu-hover);
      transform: translateY(-2px);
    }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 70px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .icon-btn,
    .menu-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.2s ease, background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    }

    .icon-btn:hover,
    .menu-btn:hover {
      transform: translateY(-2px);
    }

    .menu-btn {
      display: none;
      font-size: 24px;
    }

    .theme-icon {
      position: absolute;
      font-size: 20px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .theme-icon.sun {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }

    .theme-icon.moon {
      opacity: 0;
      transform: rotate(-90deg) scale(0.5);
    }

    body.dark-mode .theme-icon.sun {
      opacity: 0;
      transform: rotate(90deg) scale(0.5);
    }

    body.dark-mode .theme-icon.moon {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }

    .hero {
      min-height: 100vh;
      padding: 120px 20px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-inner {
      width: 100%;
      max-width: 1520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(8px);
    }

    .logo-canvas-wrap {
      position: relative;
      width: min(1380px, 94vw);
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      overscroll-behavior: none;
    }

    #logoParticleCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .hidden-logo-source {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    @media (max-width: 1200px) {
      .site-header {
        padding: 20px 24px;
      }

      .sj-logo {
        font-size: 31px;
      }

      .gnb-area {
        padding-right: 18px;
      }

      .gnb a {
        font-size: 18px;
        padding: 10px 12px;
      }

      .logo-canvas-wrap {
        height: 300px;
      }
    }

    @media (max-width: 980px) {
      .site-header {
        padding: 18px 16px;
      }

      .menu-btn {
        display: inline-flex;
      }

      .gnb-area {
        flex: 0;
        padding-right: 0;
      }

      .gnb {
        display: none;
        position: absolute;
        top: calc(100% + 10px);
        left: 16px;
        right: 16px;
        padding: 18px;
        border-radius: 22px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        background: var(--bg);
        border: 1px solid var(--button-border);
        box-shadow: var(--shadow);
      }

      .gnb.open {
        display: flex;
      }

      .gnb a {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 18px;
        transform: none !important;
      }

      .gnb a:hover {
        transform: none;
      }

      .hero {
        padding: 110px 14px 40px;
      }

      .logo-canvas-wrap {
        width: 100%;
        height: 220px;
      }
    }

    @media (max-width: 560px) {
      .sj-logo {
        font-size: 28px;
      }

      .icon-btn,
      .menu-btn {
        width: 42px;
        height: 42px;
      }

      .theme-icon {
        font-size: 18px;
      }

      .logo-canvas-wrap {
        height: 170px;
      }
    }
  </style>
</head>

<body>
  <div class="site-wrap">
    <header class="site-header">
      <a href="/" class="logo sj-logo" aria-label="SJ*5 홈">
        SJ*5
      </a>

      <div class="gnb-area">
        <nav class="gnb" id="gnb">
          <a href="/about.html">ABOUT</a>
          <a href="/order.html">ORDER</a>
          <a href="/manual.html">MANUAL</a>
          <a href="/qa.html">Q&amp;A</a>
          <a href="/portfolio.html">PORTFOLIO</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
          <a href="/member/login.html">LOGIN</a>
        </nav>
      </div>

      <div class="header-tools">
        <button type="button" class="menu-btn" id="menuBtn" aria-label="메뉴 열기">☰</button>
        <button type="button" class="icon-btn" id="themeToggle" aria-label="다크모드 전환">
          <span class="theme-icon sun">☀</span>
          <span class="theme-icon moon">☾</span>
        </button>
      </div>
    </header>

    <main class="hero">
      <div class="hero-inner">
        <div class="logo-canvas-wrap" id="canvasWrap">
          <canvas id="logoParticleCanvas"></canvas>
        </div>
      </div>
    </main>

    <div class="hidden-logo-source">
      <canvas id="textSource"></canvas>
    </div>
  </div>

  <script>
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    const menuBtn = document.getElementById('menuBtn');
    const gnb = document.getElementById('gnb');

    const savedTheme = localStorage.getItem('agitTheme');

    if (savedTheme === 'dark') {
      body.classList.add('dark-mode');
    }

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');

      localStorage.setItem(
        'agitTheme',
        body.classList.contains('dark-mode') ? 'dark' : 'light'
      );

      setTimeout(buildLogoParticles, 30);
    });

    if (menuBtn && gnb) {
      menuBtn.addEventListener('click', () => {
        gnb.classList.toggle('open');
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 980) {
          gnb.classList.remove('open');
        }
      });
    }

    const canvas = document.getElementById('logoParticleCanvas');
    const wrap = document.getElementById('canvasWrap');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const pointer = {
      x: -9999,
      y: -9999,
      active: false,
      radius: 95
    };

    let particles = [];
    let animationId = null;
    let introPlayed = false;
    let introFrame = 0;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = wrap.getBoundingClientRect();

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);

      buildLogoParticles();
    }

    function buildLogoParticles() {
      particles = [];

      const width = wrap.clientWidth;
      const height = wrap.clientHeight;

      const off = document.createElement('canvas');
      const offCtx = off.getContext('2d', { willReadFrequently: true });

      off.width = width;
      off.height = height;

      offCtx.clearRect(0, 0, width, height);

      const fontSize = Math.min(width * 0.165, height * 0.78);

      offCtx.fillStyle = '#000';
      offCtx.font = `900 ${fontSize}px Arial, Helvetica, sans-serif`;
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';

      offCtx.fillText('PORTFOLIO', width / 2, height / 2);

      const imageData = offCtx.getImageData(0, 0, width, height).data;
      const gap = width < 560 ? 4 : width < 980 ? 5 : 6;

      for (let y = 0; y < height; y += gap) {
        for (let x = 0; x < width; x += gap) {
          const index = (y * width + x) * 4;
          const alpha = imageData[index + 3];

          if (alpha > 50) {
            particles.push({
              baseX: x,
              baseY: y,
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 12,
              vy: (Math.random() - 0.5) * 12,
              size: width < 980 ? 1.6 : 2,
              delay: Math.random() * 40
            });
          }
        }
      }
    }

    function getDotColor() {
      return getComputedStyle(document.body).getPropertyValue('--text').trim() || '#111111';
    }

    function animate() {
      const width = wrap.clientWidth;
      const height = wrap.clientHeight;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = getDotColor();

      if (!introPlayed) {
        introFrame++;

        if (introFrame > 70) {
          introPlayed = true;
        }
      }

      for (const p of particles) {
        const dx = p.x - pointer.x;
        const dy = p.y - pointer.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (!introPlayed) {
          if (introFrame > p.delay) {
            p.vx += (p.baseX - p.x) * 0.045;
            p.vy += (p.baseY - p.y) * 0.045;
          }
        } else {
          if (pointer.active && dist < pointer.radius) {
            const force = (pointer.radius - dist) / pointer.radius;
            const angle = Math.atan2(dy, dx);
            const push = force * 8.5;

            p.vx += Math.cos(angle) * push;
            p.vy += Math.sin(angle) * push;
          }

          p.vx += (p.baseX - p.x) * 0.09;
          p.vy += (p.baseY - p.y) * 0.09;
        }

        p.vx *= 0.93;
        p.vy *= 0.93;

        p.x += p.vx;
        p.y += p.vy;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      animationId = requestAnimationFrame(animate);
    }

    function updatePointer(clientX, clientY) {
      const rect = wrap.getBoundingClientRect();

      pointer.x = clientX - rect.left;
      pointer.y = clientY - rect.top;
      pointer.active = true;
    }

    function clearPointer() {
      pointer.active = false;
      pointer.x = -9999;
      pointer.y = -9999;
    }

    wrap.addEventListener('mousemove', (e) => {
      updatePointer(e.clientX, e.clientY);
    });

    wrap.addEventListener('mouseleave', clearPointer);

    wrap.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];

      if (!touch) return;

      updatePointer(touch.clientX, touch.clientY);
      e.preventDefault();
    }, { passive: false });

    wrap.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];

      if (!touch) return;

      updatePointer(touch.clientX, touch.clientY);
      e.preventDefault();
    }, { passive: false });

    wrap.addEventListener('touchend', clearPointer, { passive: true });
    wrap.addEventListener('touchcancel', clearPointer, { passive: true });

    function initCanvas() {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      pointer.radius = window.innerWidth <= 980 ? 70 : 100;
      introPlayed = false;
      introFrame = 0;

      resizeCanvas();
      animate();
    }

    initCanvas();

    window.addEventListener('resize', initCanvas);
  </script>
</body>
</html>
