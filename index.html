<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<style>
.nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:32px 40px;
    z-index:999;
}

.logo{
    font-size:14px;
    font-weight:700;
    letter-spacing:.12em;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:12px;
    font-weight:500;
    letter-spacing:.08em;
    transition:.3s;
}

.menu a:hover{
    opacity:.35;
}

@media(max-width:768px){

    .nav{
        padding:24px;
    }

    .menu{
        gap:18px;
    }

    .menu a{
        font-size:11px;
    }
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
}

.hero{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 40px;
    overflow:hidden;
}

.title{
    width:min(1500px,100%);

    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;

    font-size:clamp(80px,8vw,140px);
    font-weight:700;
    letter-spacing:-0.08em;
    line-height:1;
}

.fixed{
    white-space:nowrap;
    text-align:center;
    padding:0 .2em;
}

.box{
    width:100%;
    height:1.1em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 14s infinite ease-in-out;
}

.word{
    height:1.1em;
    line-height:1.1em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
    padding-right:.08em;
}

.right .word{
    text-align:left;
    padding-left:.08em;
}

.subtitle{
    margin-top:34px;
    font-size:20px;
    color:#8a8a8a;
    letter-spacing:-0.02em;
}

@keyframes slideText{

    0%,16%{
        transform:translateY(0);
    }

    22%,38%{
        transform:translateY(-1.1em);
    }

    44%,60%{
        transform:translateY(-2.2em);
    }

    66%,82%{
        transform:translateY(-3.3em);
    }

    88%,100%{
        transform:translateY(-4.4em);
    }

}

@media(max-width:768px){

    .hero{
        padding:0 24px;
    }

    .title{
        font-size:clamp(48px,11vw,82px);
    }

    .subtitle{
        font-size:16px;
    }

}

</style>
</head>

<body>
<nav class="nav">
    <div class="logo">Portfolio</div>

    <div class="menu">
        <a href="#about">ABOUT</a>
        <a href="#works">WORKS</a>
        <a href="#archive">ARCHIVE</a>
        <a href="#contact">CONTACT</a>
    </div>
</nav>
<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">

                <div class="word">감각을</div>
                <div class="word">가치를</div>
                <div class="word">경험을</div>
                <div class="word">생각을</div>

                <!-- 첫 문구 복제 -->
                <div class="word">감각을</div>

            </div>
        </div>

        <span class="fixed">담은</span>

        <div class="box right">
            <div class="slider">

                <div class="word">디자인</div>
                <div class="word">퀄리티</div>
                <div class="word">임팩트</div>
                <div class="word">디테일</div>

                <!-- 첫 문구 복제 -->
                <div class="word">디자인</div>

            </div>
        </div>

    </h1>

    <p class="subtitle">
        단 한줄로 나의 브랜드를 현실로 만들어보세요
    </p>

</section>

</body>
</html>
