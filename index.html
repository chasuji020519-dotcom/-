<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
    color:#111;
}

.hero{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 40px;
    overflow:hidden;
}

.title{
    width:min(1600px,100%);

    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;

    font-size:clamp(72px,8vw,130px);
    font-weight:700;
    letter-spacing:-0.075em;
    line-height:1;
}

.fixed{
    white-space:nowrap;
    text-align:center;
    padding:0 .22em;
}

.box{
    width:100%;
    height:1.1em;
    overflow:hidden;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 12s infinite ease-in-out;
    will-change:transform;
}

.word{
    height:1.1em;
    line-height:1.1em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
    padding-right:.08em;
}

.right .word{
    text-align:left;
    padding-left:.08em;
}

.subtitle{
    margin-top:34px;

    font-size:20px;
    font-weight:400;

    color:#8a8a8a;
    letter-spacing:-0.02em;
    text-align:center;
}

@keyframes slideText{

    0%,18%{
        transform:translateY(0);
    }

    25%,43%{
        transform:translateY(-1.1em);
    }

    50%,68%{
        transform:translateY(-2.2em);
    }

    75%,93%{
        transform:translateY(-3.3em);
    }

    100%{
        transform:translateY(0);
    }

}

@media(max-width:768px){

    .hero{
        padding:0 24px;
    }

    .title{
        grid-template-columns:1fr;
        gap:4px;

        font-size:clamp(50px,12vw,82px);
        text-align:center;
    }

    .box{
        width:100%;
    }

    .left .word,
    .right .word{
        text-align:center;
        padding:0;
    }

    .fixed{
        padding:0;
    }

    .subtitle{
        margin-top:24px;
        font-size:16px;
    }

}

</style>
</head>

<body>

<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">
                <div class="word">감각을</div>
                <div class="word">가치를</div>
                <div class="word">경험을</div>
                <div class="word">생각을</div>
            </div>
        </div>

        <span class="fixed">담은</span>

        <div class="box right">
            <div class="slider">
                <div class="word">디자인</div>
                <div class="word">퀄리티</div>
                <div class="word">임팩트</div>
                <div class="word">디테일</div>
            </div>
        </div>

    </h1>

    <p class="subtitle">
        Visual Designer · UI/UX · Branding
    </p>

</section>

</body>
</html>
