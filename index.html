<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Title Motion</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
}

.title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  font-size:clamp(36px,6vw,86px);
  font-weight:700;
  letter-spacing:-0.06em;
  color:#111;
}

.box{
  height:1.15em;
  overflow:hidden;
}

.left{
  width:5em;
}

.right{
  width:4em;
}

.slider{
  display:flex;
  flex-direction:column;
  animation:slideText 8s infinite cubic-bezier(.76,0,.24,1);
}

.word{
  height:1.15em;
  line-height:1.15em;
  white-space:nowrap;
}

.left .word{
  text-align:right;
}

.right .word{
  text-align:left;
}

.fixed{
  flex-shrink:0;
}

@keyframes slideText{
  0%,18%{
    transform:translateY(0);
  }

  25%,43%{
    transform:translateY(-1.15em);
  }

  50%,68%{
    transform:translateY(-2.3em);
  }

  75%,93%{
    transform:translateY(-3.45em);
  }

  100%{
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<h1 class="title">
  <span class="box left">
    <span class="slider">
      <span class="word">매출내기</span>
      <span class="word">운영하기</span>
      <span class="word">성장하기</span>
      <span class="word">디자인하기</span>
    </span>
  </span>

  <span class="fixed">쉬운</span>

  <span class="box right">
    <span class="slider">
      <span class="word">브랜드</span>
      <span class="word">쇼핑몰</span>
      <span class="word">브랜드</span>
      <span class="word">자사몰</span>
    </span>
  </span>
</h1>

</body>
</html>
