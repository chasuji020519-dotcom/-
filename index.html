<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
}

.hero{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:0 24px;
}

.title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;

    font-size:clamp(42px,6vw,88px);
    font-weight:700;
    letter-spacing:-0.06em;
    color:#111;
}

.fixed{
    flex-shrink:0;
}

.box{
    height:1.15em;
    overflow:hidden;
}

.left{
    width:5em;
}

.right{
    width:4em;
}

.slider{
    display:flex;
    flex-direction:column;
    animation:slideText 8s infinite;
}

.word{
    height:1.15em;
    line-height:1.15em;
    white-space:nowrap;
}

.left .word{
    text-align:right;
}

.right .word{
    text-align:left;
}

.subtitle{
    margin-top:28px;

    font-size:18px;
    color:#8f8f8f;

    font-weight:400;
    letter-spacing:-0.02em;

    text-align:center;
}

@keyframes slideText{

    0%,20%{
        transform:translateY(0);
    }

    25%,45%{
        transform:translateY(-1.15em);
    }

    50%,70%{
        transform:translateY(-2.3em);
    }

    75%,95%{
        transform:translateY(-3.45em);
    }

    100%{
        transform:translateY(0);
    }

}

@media(max-width:768px){

    .title{
        gap:10px;
        font-size:clamp(28px,8vw,48px);
    }

    .left{
        width:4.8em;
    }

    .right{
        width:3.8em;
    }

    .subtitle{
        font-size:15px;
    }

}

</style>
</head>
<body>

<section class="hero">

    <h1 class="title">

        <div class="box left">
            <div class="slider">
                <div class="word">매출내기</div>
                <div class="word">운영하기</div>
                <div class="word">성장하기</div>
                <div class="word">디자인하기</div>
            </div>
        </div>

        <span class="fixed">쉬운</span>

        <div class="box right">
            <div class="slider">
                <div class="word">브랜드</div>
                <div class="word">쇼핑몰</div>
                <div class="word">브랜드</div>
                <div class="word">자사몰</div>
            </div>
        </div>

    </h1>

    <p class="subtitle">
        나의 브랜드를 현실로 만들어보세요
    </p>

</section>

</body>
</html>
