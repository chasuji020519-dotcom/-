<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    font-family:Pretendard,sans-serif;
}

.title{
    position:relative;
    width:900px;
    height:120px;
    overflow:hidden;
}

.item{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    font-size:72px;
    font-weight:700;
    opacity:0;
    transform:translateY(-60px);
}

.item:nth-child(1){
    animation:textChange 8s infinite;
}

.item:nth-child(2){
    animation:textChange 8s infinite 2s;
}

.item:nth-child(3){
    animation:textChange 8s infinite 4s;
}

.item:nth-child(4){
    animation:textChange 8s infinite 6s;
}

.easy{
    color:#111;
}

.sub{
    color:#111;
}

@keyframes textChange{

    0%{
        opacity:0;
        transform:translateY(-60px);
    }

    10%{
        opacity:1;
        transform:translateY(0);
    }

    40%{
        opacity:1;
        transform:translateY(0);
    }

    50%{
        opacity:0;
        transform:translateY(60px);
    }

    100%{
        opacity:0;
        transform:translateY(60px);
    }
}
</style>
</head>
<body>

<div class="title">

    <div class="item">
        <span>매출내기</span>
        <span class="easy">쉬운</span>
        <span class="sub">브랜드</span>
    </div>

    <div class="item">
        <span>운영하기</span>
        <span class="easy">쉬운</span>
        <span class="sub">쇼핑몰</span>
    </div>

    <div class="item">
        <span>성장하기</span>
        <span class="easy">쉬운</span>
        <span class="sub">브랜드</span>
    </div>

    <div class="item">
        <span>디자인하기</span>
        <span class="easy">쉬운</span>
        <span class="sub">자사몰</span>
    </div>

</div>

</body>
</html>
