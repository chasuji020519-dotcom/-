<script>
const body=document.body;
const themeToggle=document.getElementById('themeToggle');
const menuBtn=document.getElementById('menuBtn');
const gnb=document.getElementById('gnb');
const mobileMenu=document.getElementById('mobileMenu');
const mobileOverlay=document.getElementById('mobileOverlay');

const savedTheme=localStorage.getItem('agitTheme');
if(savedTheme==='dark') body.classList.add('dark-mode');

function openMobileMenu(){
  if(!mobileMenu||!mobileOverlay)return;
  mobileMenu.classList.add('open');
  mobileOverlay.classList.add('open');
  body.style.overflow='hidden';
}

function closeMobileMenu(){
  if(!mobileMenu||!mobileOverlay)return;
  mobileMenu.classList.remove('open');
  mobileOverlay.classList.remove('open');
  body.style.overflow='';
}

if(themeToggle){
  themeToggle.addEventListener('click',()=>{
    body.classList.toggle('dark-mode');
    localStorage.setItem('agitTheme',body.classList.contains('dark-mode')?'dark':'light');
  });
}

if(menuBtn){
  menuBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(mobileMenu&&mobileMenu.classList.contains('open')) closeMobileMenu();
    else openMobileMenu();
  });
}

if(mobileOverlay) mobileOverlay.addEventListener('click',closeMobileMenu);

document.addEventListener('click',(e)=>{
  if(!mobileMenu||!menuBtn)return;
  if(!mobileMenu.contains(e.target)&&!menuBtn.contains(e.target)) closeMobileMenu();
});

window.addEventListener('resize',()=>{
  if(window.innerWidth>980){
    closeMobileMenu();
    if(gnb)gnb.classList.remove('open');
  }
});

const canvas=document.getElementById("magnetSandCanvas");
const ctx=canvas.getContext("2d");

let w,h,dpr;
let particles=[];
let points=[];

let mouse={
  x:-9999,
  y:-9999,
  px:-9999,
  py:-9999,
  vx:0,
  vy:0
};

const TEXT=["start","with","mix."];

function getParticleColor(){
  return body.classList.contains('dark-mode') ? '245,245,245' : '17,17,17';
}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  w=window.innerWidth;
  h=window.innerHeight;

  canvas.width=w*dpr;
  canvas.height=h*dpr;
  canvas.style.width=w+"px";
  canvas.style.height=h+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);

  makePoints();
  makeParticles();
}

function makePoints(){
  points=[];

  const off=document.createElement("canvas");
  const octx=off.getContext("2d",{willReadFrequently:true});

  off.width=w;
  off.height=h;

  const fontSize=Math.min(w*0.17,h*0.21);
  const lineHeight=fontSize*0.85;

  octx.clearRect(0,0,w,h);
  octx.fillStyle="#fff";
  octx.textAlign="center";
  octx.textBaseline="middle";
  octx.font=`900 ${fontSize}px Arial Black, Impact, sans-serif`;

  const cy=h/2-lineHeight*0.05;

  TEXT.forEach((t,i)=>{
    octx.fillText(t,w/2,cy+(i-1)*lineHeight);
  });

  const img=octx.getImageData(0,0,w,h).data;
  const gap=window.innerWidth<560 ? 3 : 2;

  for(let y=0;y<h;y+=gap){
    for(let x=0;x<w;x+=gap){
      const a=img[(y*w+x)*4+3];

      if(a>120 && Math.random()>0.1){
        points.push({
          x:x+(Math.random()-0.5)*1.5,
          y:y+(Math.random()-0.5)*1.5
        });
      }else if(a>30 && Math.random()>0.6){
        points.push({
          x:x+(Math.random()-0.5)*4,
          y:y+(Math.random()-0.5)*4
        });
      }
    }
  }
}

function makeParticles(){
  particles=points.map(p=>({
    x:w/2+(Math.random()-0.5)*w,
    y:h/2+(Math.random()-0.5)*h,
    tx:p.x,
    ty:p.y,
    vx:0,
    vy:0,
    r:Math.random()*0.6+0.2,
    a:Math.random()*0.4+0.5,
    noise:Math.random()*0.08+0.015,
    magnet:Math.random()*0.7+0.8,
    tear:0
  }));
}

function animate(){
  ctx.clearRect(0,0,w,h);

  const rgb=getParticleColor();
  const speed=Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy);
  const dirX=mouse.vx/(speed||1);
  const dirY=mouse.vy/(speed||1);

  for(const p of particles){
    const homeX=p.tx-p.x;
    const homeY=p.ty-p.y;

    const dx=mouse.x-p.x;
    const dy=mouse.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;

    const magnetRange=window.innerWidth<560 ? 120 : 160;

    if(dist<magnetRange){
      const t=1-dist/magnetRange;

      if(speed>10) p.tear=1;

      const pullPower=t*(7.5+speed*0.12)*p.magnet;
      p.vx+=(dx/dist)*pullPower;
      p.vy+=(dy/dist)*pullPower;

      const swirlPower=t*(8.5+speed*0.08);
      p.vx+=(-dy/dist)*swirlPower;
      p.vy+=( dx/dist)*swirlPower;

      const followPower=t*(speed*0.16+3);
      p.vx+=dirX*followPower;
      p.vy+=dirY*followPower;

      if(speed>18){
        p.vx+=(Math.random()-0.5)*speed*0.35*t;
        p.vy+=(Math.random()-0.5)*speed*0.35*t;
      }
    }else{
      const homeForce=p.tear>0 ? 0.004 : 0.018;
      p.vx+=homeX*homeForce;
      p.vy+=homeY*homeForce;
    }

    const weakHome=p.tear>0 ? 0.002 : 0.006;
    p.vx+=homeX*weakHome;
    p.vy+=homeY*weakHome;

    p.tear*=0.965;

    p.vx+=(Math.random()-0.5)*p.noise;
    p.vy+=(Math.random()-0.5)*p.noise;

    p.vx*=0.89;
    p.vy*=0.89;

    p.x+=p.vx;
    p.y+=p.vy;

    ctx.beginPath();
    ctx.fillStyle=`rgba(${rgb},${p.a})`;
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

function movePointer(x,y){
  mouse.vx=x-mouse.px;
  mouse.vy=y-mouse.py;
  mouse.x=x;
  mouse.y=y;
  mouse.px=x;
  mouse.py=y;
}

window.addEventListener("mousemove",e=>{
  movePointer(e.clientX,e.clientY);
});

window.addEventListener("mouseleave",()=>{
  mouse.x=-9999;
  mouse.y=-9999;
  mouse.px=-9999;
  mouse.py=-9999;
  mouse.vx=0;
  mouse.vy=0;
});

window.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  if(!t)return;
  movePointer(t.clientX,t.clientY);
},{passive:true});

window.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  if(!t)return;
  movePointer(t.clientX,t.clientY);
},{passive:true});

window.addEventListener("touchend",()=>{
  mouse.x=-9999;
  mouse.y=-9999;
  mouse.vx=0;
  mouse.vy=0;
},{passive:true});

window.addEventListener("resize",resize);

resize();
animate();
</script>
